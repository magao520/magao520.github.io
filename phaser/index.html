<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>废土交易所 - Phaser 3 版</title>
<script src="https://unpkg.com/mqtt@5.10.4/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js" crossorigin="anonymous"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+SC:wght@400;700;900&family=Special+Elite&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1610;--panel:#2a2018;--accent:#8b2020;--gold:#b8960f;--green:#4a7a3a;--text:#c4b896;--dim:#7a7060;--border:#4a3828}
body{background:var(--bg);color:var(--text);font-family:'Press Start 2P','Courier New',monospace;min-height:100vh;overflow:hidden;font-size:10px}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 4px,rgba(0,0,0,.06) 4px,rgba(0,0,0,.06) 8px);pointer-events:none;z-index:2}
#game-container{position:fixed;inset:0;z-index:1}
#game-container canvas{display:block!important}
#ui-layer{position:fixed;inset:0;z-index:10;pointer-events:none}
#ui-layer>*{pointer-events:auto}
.top-bar{position:fixed;top:0;left:0;right:0;height:40px;display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:rgba(26,22,16,.95);border-bottom:1px solid var(--border);z-index:50}
.res-display{display:flex;align-items:center;gap:6px;background:rgba(184,150,15,.08);border:1px solid rgba(184,150,15,.2);padding:5px 12px;border-radius:2px;font-size:13px;color:var(--gold)}
.mobile-btn{position:fixed;z-index:20;width:60px;height:60px;border-radius:50%;border:2px solid var(--gold);background:rgba(42,32,16,.9);color:var(--gold);font-size:24px;cursor:pointer;display:none}
#action-btn{bottom:70px;right:12px}
#fire-btn{bottom:140px;right:12px;border-color:#c4463a;background:rgba(180,40,40,.9);color:#fff}
#swap-btn{bottom:210px;right:12px;width:50px;height:50px;font-size:18px}
#mobile-nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(26,22,16,.98);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
#mobile-nav button{flex:1;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit}
#mobile-nav button span:first-child{font-size:20px}
#mobile-nav button span:last-child{font-size:9px;color:var(--dim)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 20px;background:rgba(42,32,16,.95);border:1px solid var(--gold);color:var(--gold);border-radius:2px;font-size:13px;font-weight:700;z-index:999;animation:toastIn .3s ease-out,toastOut .3s ease-in 2.7s forwards;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
#loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;font-family:'Press Start 2P',monospace}
#loading-overlay h2{color:var(--gold);font-size:14px;margin-bottom:20px}
#loading-bar-wrap{width:200px;height:8px;background:rgba(255,255,255,.1);border:1px solid var(--border)}
#loading-bar{width:0%;height:100%;background:var(--gold);transition:width .3s}
#loading-text{color:var(--dim);font-size:9px;margin-top:8px}
#error-box{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;padding:20px;text-align:center}
#error-box h2{color:#c4463a;font-size:12px;margin-bottom:12px}
#error-box p{color:var(--dim);font-size:9px;line-height:1.8;max-width:300px}
#error-box button{margin-top:20px;padding:10px 20px;background:var(--gold);color:#1a1610;border:none;font-family:inherit;font-size:10px;cursor:pointer}
</style>
</head>
<body>
<div id="loading-overlay">
  <h2>废土交易所</h2>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-text">初始化中...</div>
</div>
<div id="error-box">
  <h2>加载失败</h2>
  <p id="error-msg">游戏引擎初始化失败，请刷新重试</p>
  <button onclick="location.reload()">刷新页面</button>
</div>
<div id="game-container"></div>
<div id="ui-layer">
  <div class="top-bar">
    <div style="font-family:'Special Elite',cursive;font-size:16px;color:var(--gold)">WASTELAND</div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="res-display"><span style="font-size:16px">💊</span><span id="user-chips">50</span></div>
      <span id="user-name" style="font-size:11px;color:var(--dim)">幸存者</span>
    </div>
  </div>
  <button class="mobile-btn" id="action-btn" onclick="window.gameScene?.doAction()">👆</button>
  <button class="mobile-btn" id="fire-btn" ontouchstart="window.gameScene?._fireDown()" ontouchend="window.gameScene?._fireUp()">🔥</button>
  <button class="mobile-btn" id="swap-btn" onclick="window.gameScene?.swapGun()">🔫</button>
  <div id="mobile-nav">
    <button onclick="showCreateModal()"><span>🎮</span><span>牌桌</span></button>
    <button onclick="showSettings()"><span>⚙️</span><span>设置</span></button>
    <button onclick="showFriendPanel()"><span>👥</span><span>社交</span></button>
    <button onclick="showMailPanel()"><span>📬</span><span>邮件</span></button>
    <button onclick="toggleChat()"><span>💬</span><span>聊天</span></button>
  </div>
</div>
<script>
// 错误捕获
window.onerror = function(msg, url, line, col, err) {
  document.getElementById('loading-overlay').style.display = 'none';
  var eb = document.getElementById('error-box');
  eb.style.display = 'flex';
  var shortUrl = url ? url.split('/').pop() : '';
  document.getElementById('error-msg').textContent = shortUrl + ': ' + msg + ' (行' + line + ')';
  return true;
};
</script>
<script src="js/main.js"></script>
</body>
</html>
