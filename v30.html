<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>废土交易所 v30.0 - 终极版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+SC:wght@400;700;900&family=Special+Elite&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1610;--panel:#2a2018;--accent:#8b2020;--gold:#b8960f;--green:#4a7a3a;--text:#c4b896;--dim:#7a7060;--border:#4a3828}
body{background:var(--bg);color:var(--text);font-family:'Press Start 2P','Courier New',monospace;min-height:100vh;overflow:hidden;font-size:10px}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 4px,rgba(0,0,0,.06) 4px,rgba(0,0,0,.06) 8px);pointer-events:none;z-index:2}
#gameCanvas{position:fixed;inset:0;z-index:1}
#ui-layer{position:fixed;inset:0;z-index:10;pointer-events:none}
#ui-layer>*{pointer-events:auto}
.top-bar{position:fixed;top:0;left:0;right:0;height:40px;display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:rgba(26,22,16,.95);border-bottom:1px solid var(--border);z-index:50}
.res-display{display:flex;align-items:center;gap:6px;background:rgba(184,150,15,.08);border:1px solid rgba(184,150,15,.2);padding:5px 12px;border-radius:2px;font-size:13px;color:var(--gold)}
.mobile-btn{position:fixed;z-index:20;width:60px;height:60px;border-radius:50%;border:2px solid var(--gold);background:rgba(42,32,16,.9);color:var(--gold);font-size:24px;cursor:pointer}
#action-btn{bottom:70px;right:12px}
#fire-btn{bottom:140px;right:12px;border-color:#c4463a;background:rgba(180,40,40,.9);color:#fff}
#swap-btn{bottom:210px;right:12px;width:50px;height:50px;font-size:18px}
#mobile-nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(26,22,16,.98);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
#mobile-nav button{flex:1;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit}
#mobile-nav button span:first-child{font-size:20px}
#mobile-nav button span:last-child{font-size:9px;color:var(--dim)}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200}
#loading h2{color:var(--gold);font-size:14px;margin-bottom:20px}
#loading-bar{width:200px;height:8px;background:rgba(255,255,255,.1);border:1px solid var(--border)}
#loading-progress{width:0%;height:100%;background:var(--gold);transition:width .3s}
#loading-text{color:var(--dim);font-size:9px;margin-top:8px}
</style>
</head>
<body>
<div id="loading">
  <h2>废土交易所 v30.0</h2>
  <div id="loading-bar"><div id="loading-progress"></div></div>
  <div id="loading-text">加载中...</div>
</div>
<canvas id="gameCanvas"></canvas>
<div id="ui-layer">
  <div class="top-bar">
    <div style="font-family:'Special Elite',cursive;font-size:16px;color:var(--gold)">WASTELAND v30</div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="res-display"><span style="font-size:16px">💊</span><span id="user-chips">50</span></div>
      <span id="user-name" style="font-size:11px;color:var(--dim)">幸存者</span>
    </div>
  </div>
  <button class="mobile-btn" id="action-btn">👆</button>
  <button class="mobile-btn" id="fire-btn">🔥</button>
  <button class="mobile-btn" id="swap-btn">🔫</button>
  <div id="mobile-nav">
    <button onclick="alert('牌桌功能开发中')"><span>🎮</span><span>牌桌</span></button>
    <button onclick="alert('设置功能开发中')"><span>⚙️</span><span>设置</span></button>
    <button onclick="alert('社交功能开发中')"><span>👥</span><span>社交</span></button>
    <button onclick="alert('邮件功能开发中')"><span>📬</span><span>邮件</span></button>
    <button onclick="alert('聊天功能开发中')"><span>💬</span><span>聊天</span></button>
  </div>
</div>
<script src="js/game-v2.js"></script>
<script>
// 更新加载进度
const progress = document.getElementById('loading-progress');
const text = document.getElementById('loading-text');
let p = 0;
const interval = setInterval(() => {
  p += 10;
  progress.style.width = p + '%';
  if (p >= 100) {
    clearInterval(interval);
    text.textContent = '启动游戏...';
    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
      const game = new GameV2();
      game.start();
    }, 500);
  }
}, 100);
</script>
</body>
</html>
