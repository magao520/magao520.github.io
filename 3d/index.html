<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>生存小镇 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Courier New',monospace;touch-action:none;user-select:none}
canvas{display:block}
#ui-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#ui-overlay *{pointer-events:auto}

/* HUD */
#hud-top{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;align-items:flex-start}
#hp-bar-container{width:200px;height:16px;background:rgba(0,0,0,0.7);border:2px solid rgba(255,255,255,0.3);border-radius:3px;overflow:hidden}
#hp-bar{width:100%;height:100%;background:linear-gradient(to bottom,#5a5,#484);transition:width 0.3s}
#hp-text{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;text-shadow:1px 1px 2px #000}
#ammo-display{color:#ffdd44;font-size:14px;text-shadow:1px 1px 3px #000;text-align:right}
#gun-name{color:#aaa;font-size:11px}
#dead-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(139,0,0,0.5);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:20}
#dead-overlay.active{display:flex}
#dead-text{color:#ff4444;font-size:28px;font-weight:bold;text-shadow:2px 2px 4px #000}
#respawn-text{color:#ffaaaa;font-size:16px;margin-top:10px}

/* 虚拟摇杆 */
#joystick-zone{position:fixed;bottom:0;left:0;width:50%;height:50%;z-index:15}
#joystick-base{position:absolute;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.3);display:none}
#joystick-thumb{position:absolute;width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,0.4);top:50%;left:50%;transform:translate(-50%,-50%)}

/* 按钮 */
#btn-fire{position:fixed;bottom:30px;right:30px;width:70px;height:70px;border-radius:50%;background:rgba(255,60,60,0.6);border:2px solid rgba(255,100,100,0.8);color:#fff;font-size:12px;font-weight:bold;z-index:15;display:flex;align-items:center;justify-content:center}
#btn-swap{position:fixed;bottom:110px;right:30px;width:50px;height:50px;border-radius:50%;background:rgba(60,60,255,0.5);border:2px solid rgba(100,100,255,0.7);color:#fff;font-size:10px;z-index:15;display:flex;align-items:center;justify-content:center}
#btn-action{position:fixed;bottom:30px;right:120px;width:50px;height:50px;border-radius:50%;background:rgba(60,255,60,0.5);border:2px solid rgba(100,255,100,0.7);color:#fff;font-size:10px;z-index:15;display:flex;align-items:center;justify-content:center}

/* 加载 */
#loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#111;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:100}
#loading h2{color:#4a7a3a;margin-bottom:20px}
#loading-bar-bg{width:300px;height:20px;background:#333;border-radius:10px;overflow:hidden}
#loading-bar{width:0%;height:100%;background:linear-gradient(90deg,#4a7a3a,#6a9a5a);transition:width 0.3s}
#loading-text{color:#888;margin-top:10px;font-size:12px}

/* 玩家名字标签 */
.name-tag{position:absolute;color:#fff;font-size:10px;text-shadow:1px 1px 2px #000;pointer-events:none;transform:translate(-50%,-100%);white-space:nowrap}

/* 交互提示 */
#interact-hint{position:fixed;bottom:50%;left:50%;transform:translate(-50%,50%);color:#ffdd44;font-size:14px;text-shadow:1px 1px 3px #000;display:none;text-align:center;z-index:15}

/* 小地图 */
#minimap{position:fixed;top:10px;right:10px;width:150px;height:150px;background:rgba(0,0,0,0.7);border:2px solid rgba(255,255,255,0.3);border-radius:5px;z-index:15;overflow:hidden}
#minimap-canvas{width:100%;height:100%}
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<!-- 加载界面 -->
<div id="loading">
  <h2>生存小镇 3D</h2>
  <div id="loading-bar-bg"><div id="loading-bar"></div></div>
  <div id="loading-text">加载中... 0%</div>
</div>

<!-- HUD -->
<div id="ui-overlay">
  <div id="hud-top">
    <div style="position:relative">
      <div id="hp-bar-container"><div id="hp-bar"></div></div>
      <div id="hp-text">100/100</div>
    </div>
    <div id="ammo-display">
      <div id="gun-name">手枪</div>
      <div id="ammo-count">∞</div>
    </div>
  </div>
</div>

<!-- 阵亡覆盖 -->
<div id="dead-overlay">
  <div id="dead-text">你阵亡了</div>
  <div id="respawn-text">复活倒计时: 5s</div>
</div>

<!-- 虚拟摇杆 -->
<div id="joystick-zone">
  <div id="joystick-base">
    <div id="joystick-thumb"></div>
  </div>
</div>

<!-- 按钮 -->
<div id="btn-fire">射击</div>
<div id="btn-swap">换枪</div>
<div id="btn-action">互动</div>

<!-- 交互提示 -->
<div id="interact-hint"></div>

<!-- 小地图 -->
<div id="minimap"><canvas id="minimap-canvas" width="150" height="150"></canvas></div>

<script type="module" src="main.js"></script>
</body>
</html>
