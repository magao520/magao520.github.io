<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>末日荒原：恐怖生存</title>
  <script src="https://cdn.jsdelivr.net/npm/playcanvas@1.70.3/build/playcanvas.min.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #070907;
      color: #f3f0e8;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #application-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      user-select: none;
    }

    .panel {
      background: rgba(13, 15, 13, .70);
      border: 1px solid rgba(232, 218, 180, .18);
      border-radius: 16px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, .36);
      backdrop-filter: blur(10px);
    }

    #stats {
      position: absolute;
      left: 12px;
      top: 10px;
      width: min(280px, 42vw);
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .stat {
      display: grid;
      grid-template-columns: 56px 1fr 38px;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .bar {
      height: 8px;
      overflow: hidden;
      border-radius: 99px;
      background: rgba(255, 255, 255, .12);
    }

    .fill {
      height: 100%;
      width: 100%;
      border-radius: 99px;
      transform-origin: left center;
      transition: transform .12s linear;
    }

    #hpFill { background: linear-gradient(90deg, #3ed47b, #d7c14a, #d94c3d); }
    #foodFill { background: linear-gradient(90deg, #d98d3d, #e5c063); }
    #waterFill { background: linear-gradient(90deg, #35a6e8, #73dbff); }
    #staminaFill { background: linear-gradient(90deg, #c9c9c9, #ffffff); }

    #inventory {
      position: absolute;
      left: 12px;
      bottom: 160px;
      padding: 10px 12px;
      min-width: 260px;
      font-size: 12px;
    }

    .inv-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      color: rgba(255, 255, 255, .82);
      line-height: 1.55;
    }

    .inv-row b { color: #fff0b5; font-size: 13px; }

    #mission {
      position: absolute;
      right: 12px;
      top: 10px;
      width: min(340px, 45vw);
      padding: 12px 14px;
      line-height: 1.55;
      color: rgba(255, 255, 255, .78);
      font-size: 12px;
    }

    #mission h3 {
      margin: 0 0 5px;
      color: #fff4bf;
      font-size: 14px;
      letter-spacing: .04em;
    }

    #message {
      position: absolute;
      left: 50%;
      top: 14px;
      transform: translateX(-50%);
      padding: 10px 16px;
      max-width: min(560px, calc(100vw - 28px));
      text-align: center;
      font-weight: 800;
      color: #fff7d7;
      font-size: 13px;
    }

    #interaction {
      position: absolute;
      left: 50%;
      bottom: 200px;
      transform: translateX(-50%);
      padding: 10px 16px;
      display: none;
      color: #fff;
      font-weight: 800;
      font-size: 14px;
    }

    #crosshair {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 20px;
      height: 20px;
      transform: translate(-50%, -50%);
      opacity: .75;
    }

    #crosshair::before, #crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255, 245, 210, .9);
      border-radius: 999px;
    }

    #crosshair::before { width: 2px; height: 20px; left: 9px; top: 0; }
    #crosshair::after { width: 20px; height: 2px; left: 0; top: 9px; }

    #miniMap {
      position: absolute;
      right: 12px;
      bottom: 160px;
      width: 140px;
      height: 140px;
      border-radius: 14px;
      background:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px),
        rgba(10, 13, 10, .68);
      background-size: 24px 24px;
      border: 1px solid rgba(232, 218, 180, .18);
      overflow: hidden;
    }

    #playerDot, .map-dot {
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    #playerDot { left: 50%; top: 50%; background: #69d3ff; box-shadow: 0 0 12px #69d3ff; }
    .map-dot { background: #ffe08a; opacity: .7; }

    .note {
      position: absolute;
      right: 12px;
      bottom: 306px;
      width: 140px;
      box-sizing: border-box;
      padding: 8px 10px;
      font-size: 11px;
      color: rgba(255, 255, 255, .6);
      line-height: 1.4;
    }

    .danger { color: #ff6d58 !important; }

    /* 伤害数字 */
    .damage-text {
      position: absolute;
      color: #ff4444;
      font-weight: 900;
      font-size: 18px;
      text-shadow: 0 2px 4px rgba(0,0,0,.8);
      pointer-events: none;
      animation: damageFloat 1s ease-out forwards;
      z-index: 100;
    }

    @keyframes damageFloat {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -150%) scale(1.3); }
    }

    /* 屏幕震动效果 */
    @keyframes screenShake {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: translate(-3px, 2px); }
      20% { transform: translate(3px, -2px); }
      30% { transform: translate(-2px, -3px); }
      40% { transform: translate(2px, 3px); }
      50% { transform: translate(-1px, 1px); }
      60% { transform: translate(1px, -1px); }
    }

    .screen-shake {
      animation: screenShake 0.3s ease-out;
    }

    /* 虚拟摇杆 */
    .joystick-zone {
      position: absolute;
      bottom: 20px;
      width: 140px;
      height: 140px;
      pointer-events: auto;
      touch-action: none;
    }

    #joystickLeft { left: 16px; z-index: 5; }
    #joystickRight { display: none; }
    #lookArea {
      position: absolute;
      right: 0;
      top: 0;
      width: 66vw;
      height: 100vh;
      pointer-events: auto;
      touch-action: none;
      z-index: 1;
    }

    .joystick-base {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 120px;
      height: 120px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: rgba(255, 255, 255, .08);
      border: 2px solid rgba(255, 255, 255, .18);
    }

    .joystick-stick {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 48px;
      height: 48px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: rgba(255, 255, 255, .22);
      border: 2px solid rgba(255, 255, 255, .35);
    }

    .joystick-label {
      position: absolute;
      bottom: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(255, 255, 255, .5);
      white-space: nowrap;
    }

    /* 操作按钮 */
    .action-btn {
      position: absolute;
      pointer-events: auto;
      touch-action: none;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .12);
      border: 2px solid rgba(255, 255, 255, .22);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.2;
    }

    .action-btn:active { background: rgba(255, 255, 255, .28); }

    #btnShoot { right: 22px; bottom: 142px; width: 78px; height: 78px; background: rgba(217, 76, 61, .28); border-color: rgba(255, 100, 86, .6); z-index: 6; }
    #btnLoot { right: 112px; bottom: 128px; z-index: 6; }
    #btnFlashlight { right: 22px; bottom: 54px; z-index: 6; }
    #btnRun { left: 156px; bottom: 36px; z-index: 6; }
    .action-btn.disabled { opacity: .45; }

    #start, #dead {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 24% 20%, rgba(154, 91, 38, .28), transparent 30%),
        radial-gradient(circle at 78% 70%, rgba(69, 91, 71, .24), transparent 34%),
        rgba(3, 5, 4, .88);
    }

    #dead { display: none; background: rgba(0, 0, 0, .72); }

    .card {
      width: min(720px, calc(100vw - 28px));
      box-sizing: border-box;
      padding: 24px;
      border-radius: 24px;
      text-align: center;
    }

    .card h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 6vw, 56px);
      letter-spacing: .06em;
      color: #fff0b5;
      text-shadow: 0 4px 24px rgba(0, 0, 0, .55);
    }

    .card p {
      margin: 8px auto;
      max-width: 600px;
      color: rgba(255, 255, 255, .76);
      line-height: 1.65;
      font-size: 14px;
    }

    button {
      pointer-events: auto;
      border: 0;
      border-radius: 999px;
      padding: 14px 36px;
      color: #1e1409;
      background: linear-gradient(135deg, #fff0a8, #d78d3f);
      font-weight: 900;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 16px 38px rgba(207, 123, 42, .34);
    }

    @media (max-width: 480px) {
      #stats { width: 46vw; left: 8px; top: 8px; padding: 8px; gap: 6px; }
      .stat { grid-template-columns: 44px 1fr 32px; gap: 6px; font-size: 11px; }
      .bar { height: 6px; }
      #inventory { left: 8px; bottom: 170px; min-width: 180px; padding: 8px 10px; font-size: 11px; }
      #mission { right: 8px; top: 8px; width: 42vw; padding: 10px 12px; font-size: 11px; }
      #mission h3 { font-size: 13px; }
      #miniMap { width: 110px; height: 110px; right: 8px; bottom: 170px; }
      .note { right: 8px; bottom: 286px; width: 110px; font-size: 10px; }
      .joystick-zone { width: 120px; height: 120px; }
      .joystick-base { width: 100px; height: 100px; }
      .joystick-stick { width: 40px; height: 40px; }
      #joystickLeft { left: 10px; bottom: 16px; }
      #joystickRight { display: none; }
      .action-btn { width: 54px; height: 54px; font-size: 12px; }
      #btnShoot { right: 14px; bottom: 132px; width: 66px; height: 66px; }
      #btnLoot { right: 88px; bottom: 118px; left: auto; transform: none; }
      #btnFlashlight { right: 14px; bottom: 56px; }
      #btnRun { left: 138px; bottom: 28px; }
    }
  </style>
</head>
<body>
  <canvas id="application-canvas"></canvas>

  <div id="hud">
    <div id="stats" class="panel">
      <div class="stat"><span>生命</span><div class="bar"><div id="hpFill" class="fill"></div></div><b id="hpText">100</b></div>
      <div class="stat"><span>饥饿</span><div class="bar"><div id="foodFill" class="fill"></div></div><b id="foodText">100</b></div>
      <div class="stat"><span>口渴</span><div class="bar"><div id="waterFill" class="fill"></div></div><b id="waterText">100</b></div>
      <div class="stat"><span>体力</span><div class="bar"><div id="staminaFill" class="fill"></div></div><b id="staminaText">100</b></div>
    </div>

    <div id="inventory" class="panel">
      <div class="inv-row"><span>武器</span><b id="weaponText">旧手枪</b></div>
      <div class="inv-row"><span>弹药</span><b id="ammoText">24</b></div>
      <div class="inv-row"><span>食物/水</span><b id="suppliesText">0/0</b></div>
      <div class="inv-row"><span>木材/废铁</span><b id="materialsText">0/0</b></div>
      <div class="inv-row"><span>探索</span><b id="distanceText">0m</b></div>
    </div>

    <div id="mission" class="panel">
      <h3>目标：活过第一天</h3>
      末日爆发，无异能。感染者会主动追击，保持警惕！左摇杆移动，右半屏滑动视角，右侧按钮射击/搜刮。
    </div>

    <div id="message" class="panel">素材加载中...</div>
    <div id="interaction" class="panel">点击搜刮</div>
    <div id="crosshair"></div>
    <div id="miniMap" class="panel"><div id="playerDot"></div></div>
    <div class="note panel">触屏操作：左摇杆移动，右半屏滑动视角，右侧按钮射击/搜刮/手电</div>

    <div id="lookArea" aria-label="右半屏滑动视角"></div>

    <!-- 虚拟摇杆 -->
    <div id="joystickLeft" class="joystick-zone">
      <div class="joystick-base"></div>
      <div class="joystick-stick" id="stickLeft"></div>
      <div class="joystick-label">移动</div>
    </div>
    <div id="joystickRight" class="joystick-zone">
      <div class="joystick-base"></div>
      <div class="joystick-stick" id="stickRight"></div>
      <div class="joystick-label">视角</div>
    </div>

    <!-- 操作按钮 -->
    <div id="btnShoot" class="action-btn">射击</div>
    <div id="btnLoot" class="action-btn">搜刮</div>
    <div id="btnFlashlight" class="action-btn">手电</div>
    <div id="btnRun" class="action-btn">奔跑</div>
  </div>

  <div id="start">
    <div class="card panel">
      <h1>末日荒原</h1>
      <p>末日爆发后，没有异能，没有救世主。你从废弃公路边醒来，只能靠搜刮、观察和子弹活下去。</p>
      <p>恐怖生存版：感染者具备智能AI追击、群体协作、恐怖音效。新增真实射击反馈、血液特效、伤害判定。</p>
      <button id="startButton" disabled>加载素材中...</button>
    </div>
  </div>

  <div id="dead">
    <div class="card panel">
      <h1 class="danger">你没能活下去</h1>
      <p id="deadText">探索距离：0m</p>
      <button id="restartButton">重新开始</button>
    </div>
  </div>

  <script>
    window.addEventListener('error', event => {
      const message = document.getElementById('message');
      const button = document.getElementById('startButton');
      if (message) message.textContent = '脚本错误：' + event.message;
      if (button) { button.textContent = '加载失败，请刷新'; button.disabled = false; }
      console.error('页面脚本错误', event.message, event.filename, event.lineno, event.colno, event.error);
    });

    try {
    const canvas = document.getElementById('application-canvas');
    const inputDevices = {
      mouse: new pc.Mouse(canvas),
      keyboard: new pc.Keyboard(window)
    };
    if ('ontouchstart' in window && pc.TouchDevice) {
      try {
        inputDevices.touch = new pc.TouchDevice(canvas);
      } catch (touchError) {
        console.warn('触屏输入设备初始化失败，已改用DOM触控按钮。', touchError);
      }
    }
    const app = new pc.Application(canvas, inputDevices);

    app.start();
    app.setCanvasFillMode(pc.FILLMODE_FILL_WINDOW);
    app.setCanvasResolution(pc.RESOLUTION_AUTO);
    app.scene.gammaCorrection = pc.GAMMA_SRGB;
    app.scene.toneMapping = pc.TONEMAP_ACES;
    app.scene.exposure = 0.95;
    app.scene.ambientLight = new pc.Color(0.22, 0.23, 0.20);
    app.scene.fog = pc.FOG_LINEAR;
    app.scene.fogColor = new pc.Color(0.30, 0.29, 0.24);
    app.scene.fogStart = 45;
    app.scene.fogEnd = 310;

    const ui = {
      start: document.getElementById('start'),
      startButton: document.getElementById('startButton'),
      dead: document.getElementById('dead'),
      restartButton: document.getElementById('restartButton'),
      message: document.getElementById('message'),
      interaction: document.getElementById('interaction'),
      deadText: document.getElementById('deadText'),
      hpFill: document.getElementById('hpFill'),
      foodFill: document.getElementById('foodFill'),
      waterFill: document.getElementById('waterFill'),
      staminaFill: document.getElementById('staminaFill'),
      hpText: document.getElementById('hpText'),
      foodText: document.getElementById('foodText'),
      waterText: document.getElementById('waterText'),
      staminaText: document.getElementById('staminaText'),
      weaponText: document.getElementById('weaponText'),
      ammoText: document.getElementById('ammoText'),
      suppliesText: document.getElementById('suppliesText'),
      materialsText: document.getElementById('materialsText'),
      distanceText: document.getElementById('distanceText'),
      miniMap: document.getElementById('miniMap'),
      btnShoot: document.getElementById('btnShoot'),
      btnLoot: document.getElementById('btnLoot'),
      btnFlashlight: document.getElementById('btnFlashlight'),
      btnRun: document.getElementById('btnRun'),
      lookArea: document.getElementById('lookArea'),
      stickLeft: document.getElementById('stickLeft'),
      stickRight: document.getElementById('stickRight')
    };

    function material(name, color, gloss, metalness) {
      const m = new pc.StandardMaterial();
      m.name = name;
      m.diffuse = color;
      m.gloss = gloss || 0.3;
      m.metalness = metalness || 0;
      m.update();
      return m;
    }

    const mat = {
      dirt: material('干裂泥土', new pc.Color(0.38, 0.31, 0.22), 0.16),
      road: material('破损公路', new pc.Color(0.075, 0.078, 0.075), 0.2),
      roadLine: material('褪色路线', new pc.Color(0.83, 0.72, 0.42), 0.22),
      rust: material('锈蚀金属', new pc.Color(0.46, 0.20, 0.11), 0.22, 0.2),
      darkMetal: material('深色金属', new pc.Color(0.10, 0.11, 0.10), 0.44, 0.4),
      glass: material('脏玻璃', new pc.Color(0.24, 0.39, 0.42), 0.65),
      human: material('幸存者外套', new pc.Color(0.21, 0.35, 0.32), 0.35),
      skin: material('皮肤', new pc.Color(0.73, 0.55, 0.39), 0.3),
      infected: material('感染者衣物', new pc.Color(0.28, 0.20, 0.18), 0.22),
      infectedSkin: material('灰败皮肤', new pc.Color(0.54, 0.57, 0.45), 0.2),
      bullet: material('枪口火光', new pc.Color(1.0, 0.78, 0.22), 0.8),
      loot: material('可搜刮提示', new pc.Color(0.95, 0.77, 0.22), 0.6),
      safe: material('安全屋标记', new pc.Color(0.16, 0.55, 0.92), 0.55),
      blood: material('血液', new pc.Color(0.7, 0.05, 0.05), 0.1),
      muzzleFlash: material('枪口闪光', new pc.Color(1.0, 0.9, 0.4), 1.0),
      spark: material('火花', new pc.Color(1.0, 0.7, 0.2), 1.0)
    };

    const assets = {};
    const postAssets = {};
    const assetCache = {};
    
    // 核心素材优先加载（用于快速启动）
    const criticalAssets = ['Zombie', 'Zombie_VlXjG0N8Eg', 'Characters_Sam', 'Rifle', 'Pistol'];
    const assetNames = [
      'barrel','bottle','box-large','box','bucket','chest','fence-fortified','fence',
      'floor-old','metal-panel-screws','metal-panel','resource-planks','resource-stone',
      'resource-wood','rock-a','rock-b','rock-c','signpost','structure-metal-doorway',
      'structure-metal-roof','structure-metal-wall','structure-metal','tent-canvas','tent',
      'tool-axe','tool-pickaxe','tree-autumn-tall','tree-autumn','tree-log','tree-tall',
      'tree','workbench'
    ];
    const postAssetNames = [
      'Characters_Sam','Characters_Matt','Characters_Shaun','Lis','Zombie','Zombie_VlXjG0N8Eg','Zombie_half',
      'Pistol','Rifle','Shotgun','Smg','Axe','Knife','Container_Green','Container_Red','Traffic_Barrier',
      'Traffic_Cone','Traffic_Light','Street_Light','Water_Tower','Trash_Bag','Trash_Bags','Pallet','Pallet_Broken',
      'Damaged_Couch','Fire_Hydrant','Town_Sign','Wheels_Stack','Pipes','Blood','Blood_Splat','Plastic_Barrier'
    ];

    const state = {
      loaded: false, started: false, alive: true,
      yaw: 0, pitch: -0.06,
      hp: 100, food: 100, water: 100, stamina: 100,
      ammo: 24, foodItems: 0, waterItems: 0, wood: 0, scrap: 0,
      weapon: '旧手枪', weaponDamage: 42, weaponCooldown: 0.35,
      fireTimer: 0, flashlight: false,
      time: 0, distance: 0,
      nearestLoot: null,
      props: [], lootables: [], enemies: [], mapDots: [],
      joyLeft: { active: false, dx: 0, dy: 0 },
      joyRight: { active: false, dx: 0, dy: 0 },
      running: false,
      lookPointerId: null,
      lastLookX: 0,
      lastLookY: 0,
      screenShake: 0,
      killCount: 0
    };

    const tmpA = new pc.Vec3();
    const tmpB = new pc.Vec3();
    const tmpC = new pc.Vec3();
    const worldSize = 980;

    function createBox(name, position, scale, m) {
      const e = new pc.Entity(name);
      e.addComponent('render', { type: 'box' });
      e.setPosition(position);
      e.setLocalScale(scale);
      e.render.material = m;
      app.root.addChild(e);
      return e;
    }

    function createCylinder(name, position, scale, m) {
      const e = new pc.Entity(name);
      e.addComponent('render', { type: 'cylinder' });
      e.setPosition(position);
      e.setLocalScale(scale);
      e.render.material = m;
      app.root.addChild(e);
      return e;
    }

    function createSphere(name, position, scale, m) {
      const e = new pc.Entity(name);
      e.addComponent('render', { type: 'sphere' });
      e.setPosition(position);
      e.setLocalScale(scale);
      e.render.material = m;
      app.root.addChild(e);
      return e;
    }

    function seededRandom(seed) {
      const x = Math.sin(seed * 127.1) * 43758.5453;
      return x - Math.floor(x);
    }

    function setMessage(text, seconds) {
      seconds = seconds || 2.2;
      ui.message.textContent = text;
      ui.message.style.opacity = '1';
      clearTimeout(setMessage.timer);

    // ========== 优化的资源加载系统 ==========
    function loadAssets() {
      let done = 0;
      let failed = 0;
      const total = assetNames.length + postAssetNames.length;
      
      function markDone() {
        done += 1;
        ui.message.textContent = '高质量素材加载中：' + done + ' / ' + total;
        if (done === total) {
          state.loaded = true;
          applyBetterPlayerModel();
          ui.startButton.disabled = false;
          ui.startButton.textContent = '进入荒原';
          if (failed > 0) {
            setMessage('素材加载完成，但有 ' + failed + ' 个模型失败。', 5);
          } else {
            setMessage('恐怖生存版加载完成：智能感染者、真实射击、血液特效已启用。');
          }
        }
      }

      // 并行加载所有素材
      assetNames.forEach(function(name) {
        app.assets.loadFromUrl('assets/kenney_survival/' + name + '.glb', 'container', function(err, asset) {
          if (!err && asset && asset.resource) {
            assets[name] = asset;
            assetCache[name] = asset;
          } else { 
            failed += 1; 
            console.warn('素材加载失败', name, err); 
          }
          markDone();
        });
      });
      
      postAssetNames.forEach(function(name) {
        app.assets.loadFromUrl('assets/quaternius_postapoc/' + name + '.glb', 'container', function(err, asset) {
          if (!err && asset && asset.resource) {
            postAssets[name] = asset;
            assetCache[name] = asset;
          } else { 
            failed += 1; 
            console.warn('末日模型加载失败', name, err); 
          }
          markDone();
        });
      });
    }

    function instantiateAsset(name, position, scale, yaw) {
      scale = scale || 1;
      yaw = yaw || 0;
      const asset = assets[name];
      if (!asset || !asset.resource) {
        return createBox(name + '-fallback', position, new pc.Vec3(scale, scale, scale), mat.rust);
      }
      const e = asset.resource.instantiateRenderEntity();
      e.name = name;
      e.setPosition(position);
      e.setLocalScale(scale, scale, scale);
      e.setEulerAngles(0, yaw, 0);
      app.root.addChild(e);
      return e;
    }

    function instantiatePostAsset(name, position, scale, yaw, parent) {
      scale = scale || 1;
      yaw = yaw || 0;
      const asset = postAssets[name];
      if (!asset || !asset.resource) {
        return createBox(name + '-fallback', position, new pc.Vec3(scale, scale, scale), mat.rust);
      }
      const e = asset.resource.instantiateRenderEntity();
      e.name = name;
      e._assetName = name;
      const baseScale = 1;
      e.setLocalScale(baseScale, baseScale, baseScale);
      if (parent) {
        parent.addChild(e);
        e.setLocalPosition(position);
        e.setLocalEulerAngles(0, yaw, 0);
      } else {
        app.root.addChild(e);
        e.setPosition(position);
        e.setEulerAngles(0, yaw, 0);
      }
      normalizePostAsset(e, name, scale, parent ? 0 : position.y, !(parent && isWeaponAsset(name)));
      return e;
    }

    function isWeaponAsset(name) {
      return ['Rifle','Shotgun','Smg','Axe','Knife','Pistol','Spear','Wooden_Bat_Barbed','Wooden_Bat_Saw'].indexOf(name) >= 0;
    }

    function targetHeightForPostAsset(name, scale) {
      let h = 1.2;
      if (name.indexOf('Characters_') === 0 || name === 'Lis') h = 1.75;
      else if (name.indexOf('Zombie') === 0 || name === 'Big_arm') h = name === 'Zombie_half' ? 0.95 : 1.65;
      else if (name.indexOf('Container_') === 0) h = 2.6;
      else if (name === 'Water_Tower') h = 13.5;
      else if (name === 'Street_Light') h = 5.8;
      else if (name.indexOf('Traffic_Light') === 0) h = 4.4;
      else if (name.indexOf('Traffic_Cone') === 0) h = 0.7;
      else if (name.indexOf('Traffic_Barrier') === 0 || name === 'Plastic_Barrier') h = 1.05;
      else if (name === 'Fire_Hydrant') h = 0.95;
      else if (name === 'Town_Sign') h = 3.0;
      else if (name === 'Damaged_Couch') h = 0.95;
      else if (name.indexOf('Trash') === 0 || name.indexOf('Pallet') === 0 || name === 'Pipes') h = 0.75;
      else if (isWeaponAsset(name)) h = 0.55;
      else if (name.indexOf('Blood') === 0) h = 0.04;
      return h * (scale || 1);
    }

    function collectAabb(entity) {
      let min = new pc.Vec3(Infinity, Infinity, Infinity);
      let max = new pc.Vec3(-Infinity, -Infinity, -Infinity);
      let found = false;
      function walk(node) {
        if (node.render && node.render.meshInstances) {
          node.render.meshInstances.forEach(function(mi) {
            const aabb = mi.aabb;
            const lo = aabb.center.clone().sub(aabb.halfExtents);
            const hi = aabb.center.clone().add(aabb.halfExtents);
            min.x = Math.min(min.x, lo.x); min.y = Math.min(min.y, lo.y); min.z = Math.min(min.z, lo.z);
            max.x = Math.max(max.x, hi.x); max.y = Math.max(max.y, hi.y); max.z = Math.max(max.z, hi.z);
            found = true;
          });
        }
        node.children.forEach(walk);
      }
      walk(entity);
      return found ? { min: min, max: max } : null;
    }

    function normalizePostAsset(entity, name, scale, groundY, adjustGround) {
      setTimeout(function() {
        const box = collectAabb(entity);
        if (!box) return;
        const height = Math.max(0.0001, box.max.y - box.min.y);
        const target = targetHeightForPostAsset(name, scale);
        const factor = target / height;
        const s = entity.getLocalScale();
        entity.setLocalScale(s.x * factor, s.y * factor, s.z * factor);
        setTimeout(function() {
          if (adjustGround === false) return;
          const adjusted = collectAabb(entity);
          if (!adjusted) return;
          const p = entity.getPosition();
          entity.setPosition(p.x, p.y + ((groundY || 0) - adjusted.min.y), p.z);
        }, 0);
      }, 0);
    }

    function createBloodEffect(position, normal) {
      // 血液喷溅粒子
      for (let i = 0; i < 8; i++) {
        const offset = new pc.Vec3(
          (Math.random() - 0.5) * 0.5,
          Math.random() * 0.5,
          (Math.random() - 0.5) * 0.5
        );
        const blood = createSphere('血液', position.clone().add(offset), 
          new pc.Vec3(0.05 + Math.random() * 0.08, 0.05 + Math.random() * 0.08, 0.05 + Math.random() * 0.08), mat.blood);
        
        // 血液下落动画
        let fallSpeed = 0.5 + Math.random() * 1;
        const fallInterval = setInterval(function() {
          const pos = blood.getPosition();
          pos.y -= fallSpeed * 0.016;
          fallSpeed += 0.02;
          blood.setPosition(pos);
          
          if (pos.y < 0.05) {
            clearInterval(fallInterval);
            setTimeout(function() { blood.destroy(); }, 3000 + Math.random() * 2000);
          }
        }, 16);
      }
      
      // 地面血迹
      const bloodStain = createBox('血迹', new pc.Vec3(position.x, 0.02, position.z), 
        new pc.Vec3(0.6 + Math.random() * 0.4, 0.01, 0.6 + Math.random() * 0.4), mat.blood);
      bloodStain.setEulerAngles(0, Math.random() * 360, 0);
      setTimeout(function() { bloodStain.destroy(); }, 8000);
    }

    function createHitSpark(position) {
      for (let i = 0; i < 5; i++) {
        const spark = createSphere('火花', position.clone(), 
          new pc.Vec3(0.03, 0.03, 0.03), mat.spark);
        const velocity = new pc.Vec3(
          (Math.random() - 0.5) * 3,
          Math.random() * 2,
          (Math.random() - 0.5) * 3
        );
        
        let life = 0;
        const sparkInterval = setInterval(function() {
          life += 0.016;
          const pos = spark.getPosition();
          pos.add(velocity.clone().mulScalar(0.016));
          velocity.y -= 5 * 0.016; // 重力
          spark.setPosition(pos);
          
          if (life > 0.3 || pos.y < 0) {
            clearInterval(sparkInterval);
            spark.destroy();
          }
        }, 16);
      }
    }

    function triggerScreenShake(intensity) {
      state.screenShake = intensity;
      document.body.classList.add('screen-shake');
      setTimeout(function() {
        document.body.classList.remove('screen-shake');
      }, 300);
    }

    function resetGame() {
      state.started = true;
      state.alive = true;
      state.hp = 100;
      state.food = 100;
      state.water = 100;
      state.stamina = 100;
      state.ammo = 24;
      state.foodItems = 0;
      state.waterItems = 0;
      state.wood = 0;
      state.scrap = 0;
      state.fireTimer = 0;
      state.yaw = 0;
      state.pitch = -0.06;
      state.time = 0;
      state.distance = 0;
      state.killCount = 0;
      player.setPosition(0, 0, 0);
      ui.start.style.display = 'none';
      ui.dead.style.display = 'none';
      updateUi();
      setMessage('你从废弃公路醒来。感染者就在附近，保持警惕！', 4);
    }

    function endGame(reason) {
      state.alive = false;
      ui.deadText.textContent = reason + '。探索距离：' + Math.round(state.distance) + ' m。消灭感染者：' + state.killCount;
      ui.dead.style.display = 'grid';
      setMessage('你没能活下去。', 5);
    }

    function updateUi() {
      const clamp = function(v) { return Math.max(0, Math.min(100, v)); };
      ui.hpFill.style.transform = 'scaleX(' + (clamp(state.hp) / 100) + ')';
      ui.foodFill.style.transform = 'scaleX(' + (clamp(state.food) / 100) + ')';
      ui.waterFill.style.transform = 'scaleX(' + (clamp(state.water) / 100) + ')';
      ui.staminaFill.style.transform = 'scaleX(' + (clamp(state.stamina) / 100) + ')';
      ui.hpText.textContent = Math.round(clamp(state.hp));
      ui.foodText.textContent = Math.round(clamp(state.food));
      ui.waterText.textContent = Math.round(clamp(state.water));
      ui.staminaText.textContent = Math.round(clamp(state.stamina));
      ui.weaponText.textContent = state.weapon;
      ui.ammoText.textContent = state.ammo;
      ui.suppliesText.textContent = state.foodItems + ' / ' + state.waterItems;
      ui.materialsText.textContent = state.wood + ' / ' + state.scrap;
      ui.distanceText.textContent = Math.round(state.distance) + 'm';
    }

    function updateMiniMap() {
      const p = player.getPosition();
      state.mapDots.forEach(function(item) {
        const dx = item.x - p.x;
        const dz = item.z - p.z;
        const scale = 0.18;
        item.dot.style.left = (90 + pc.math.clamp(dx * scale, -84, 84)) + 'px';
        item.dot.style.top = (90 + pc.math.clamp(dz * scale, -84, 84)) + 'px';
      });
    }

    function movePlayer(dt) {
      const fwd = new pc.Vec3(Math.sin(state.yaw), 0, Math.cos(state.yaw));
      const right = new pc.Vec3(Math.cos(state.yaw), 0, -Math.sin(state.yaw));
      const move = new pc.Vec3();

      const keyboard = app.keyboard;
      if (keyboard.isPressed(pc.KEY_W)) move.add(fwd);
      if (keyboard.isPressed(pc.KEY_S)) move.sub(fwd);
      if (keyboard.isPressed(pc.KEY_A)) move.sub(right);
      if (keyboard.isPressed(pc.KEY_D)) move.add(right);

      if (state.joyLeft.active) {
        const jx = state.joyLeft.dx;
        const jy = state.joyLeft.dy;
        move.add(fwd.clone().mulScalar(jy));
        move.add(right.clone().mulScalar(jx));
      }

      const running = (keyboard.isPressed(pc.KEY_SHIFT) || state.running) && state.stamina > 4 && move.lengthSq() > 0;
      if (move.lengthSq() > 0) {
        move.normalize();
        const speed = running ? 8.8 : 5.0;
        const delta = move.mulScalar(speed * dt);
        const pos = player.getPosition().clone().add(delta);
        pos.x = pc.math.clamp(pos.x, -worldSize / 2 + 8, worldSize / 2 - 8);
        pos.z = pc.math.clamp(pos.z, -worldSize / 2 + 8, worldSize / 2 - 8);
        player.setPosition(pos.x, 0, pos.z);
        state.distance += delta.length();
        if (running) state.stamina -= 18 * dt;
      } else {
        state.stamina += 13 * dt;
      }
      state.stamina = pc.math.clamp(state.stamina, 0, 100);
      player.setEulerAngles(0, state.yaw * pc.math.RAD_TO_DEG, 0);

      const p = player.getPosition();
      camera.setPosition(p.x, 1.68, p.z);
      camera.setEulerAngles(state.pitch * pc.math.RAD_TO_DEG, state.yaw * pc.math.RAD_TO_DEG, 0);
    }

    function updateNeeds(dt) {
      state.food -= 0.55 * dt;
      state.water -= 0.85 * dt;
      if (state.food <= 0 || state.water <= 0) state.hp -= 3.5 * dt;
      if (state.hp <= 0) endGame(state.food <= 0 ? '你饿到失去意识' : '你因缺水倒下');
    }

    function findNearestLoot() {
      const p = player.getPosition();
      let best = null;
      let bestD = 4.2;
      for (let i = 0; i < state.lootables.length; i++) {
        const loot = state.lootables[i];
        if (loot.looted) continue;
        const d = loot.entity.getPosition().distance(p);
        if (d < bestD) {
          best = loot;
          bestD = d;
        }
      }
      state.nearestLoot = best;
      if (best) {
        ui.interaction.style.display = 'block';
        ui.interaction.textContent = '点击搜刮：' + best.label;
      } else {
        ui.interaction.style.display = 'none';
      }
    }

    function lootNearest() {
      const loot = state.nearestLoot;
      if (!loot || loot.looted) return;
      loot.looted = true;
      if (loot.glow) {
        loot.glow.marker.destroy();
        loot.glow.light.destroy();
      }
      if (loot.type === 'food') {
        state.foodItems += 1;
        state.food = Math.min(100, state.food + 18);
        setMessage('找到罐头，饥饿值恢复。');
      } else if (loot.type === 'water') {
        state.waterItems += 1;
        state.water = Math.min(100, state.water + 22);
        setMessage('找到瓶装水，口渴值恢复。');
      } else if (loot.type === 'ammo') {
        state.ammo += 8 + Math.floor(Math.random() * 8);
        setMessage('找到一小盒子弹。');
      } else if (loot.type === 'scrap') {
        state.scrap += 2;
        setMessage('拆到一些废铁。');
      } else if (loot.type === 'materials') {
        state.wood += 2;
        state.scrap += 1;
        setMessage('获得木材和废铁。');
      } else if (loot.type === 'safe') {
        state.hp = Math.min(100, state.hp + 30);
        state.food = Math.min(100, state.food + 20);
        state.water = Math.min(100, state.water + 20);
        setMessage('你抵达了安全屋，暂时恢复状态。');
      } else {
        const roll = Math.random();
        if (roll < .34) state.foodItems += 1;
        else if (roll < .68) state.waterItems += 1;
        else state.ammo += 10;
        setMessage('搜到一些有用补给。');
      }
      updateUi();
    }

    // ========== 升级后的射击系统 ==========
    function fireWeapon() {
      if (state.fireTimer > 0 || state.ammo <= 0) {
        if (state.ammo <= 0) setMessage('没子弹了，去搜刮车辆和箱子。', 1.2);
        return;
      }
      state.fireTimer = state.weaponCooldown;
      state.ammo -= 1;
      
      const origin = camera.getPosition().clone();
      const dir = new pc.Vec3(
        Math.sin(state.yaw) * Math.cos(state.pitch),
        Math.sin(state.pitch),
        Math.cos(state.yaw) * Math.cos(state.pitch)
      ).normalize();

      // 枪口闪光特效
      createMuzzleFlash(origin, dir);
      
      // 屏幕震动
      triggerScreenShake(0.5);

      let nearest = null;
      let nearestD = 70;
      let hitPoint = null;
      
      for (let i = 0; i < state.enemies.length; i++) {
        const enemy = state.enemies[i];
        const ep = enemy.entity.getPosition().clone().add(new pc.Vec3(0, 1.0, 0));
        tmpA.copy(ep).sub(origin);
        const projected = tmpA.dot(dir);
        if (projected < 0 || projected > 70) continue;
        tmpB.copy(origin).add(dir.clone().mulScalar(projected));
        const off = tmpB.distance(ep);
        // 更精确的命中判定 - 头部和身体的不同判定
        const hitRadius = projected < 15 ? 0.6 : 0.9; // 近距离更容易命中
        if (off < hitRadius && projected < nearestD) {
          nearest = enemy;
          nearestD = projected;
          hitPoint = tmpB.clone();
        }
      }

      // 弹道特效
      createBulletTracer(origin, dir, nearest ? nearestD : 55);

      if (nearest) {
        // 计算伤害（根据距离衰减）
        const distanceFactor = Math.max(0.3, 1 - nearestD / 100);
        const damage = state.weaponDamage * distanceFactor * (0.8 + Math.random() * 0.4);
        nearest.hp -= damage;
        nearest.hearTimer = 4;
        
        // 命中特效
        if (hitPoint) {
          createBloodEffect(hitPoint, dir.clone().mulScalar(-1));
          createHitSpark(hitPoint);
          showDamageNumber(hitPoint, damage);
        }
        
        // 受击硬直 - 感染者停顿
        nearest.state = 'stunned';
        nearest.stateTimer = 0.3;
        
        if (nearest.hp <= 0) {
          // 死亡特效
          const deathPos = nearest.entity.getPosition().clone();
          createBloodEffect(deathPos.add(new pc.Vec3(0, 0.5, 0)), new pc.Vec3(0, 1, 0));
          
          nearest.entity.destroy();
          state.enemies.splice(state.enemies.indexOf(nearest), 1);
          state.killCount++;
          setMessage('感染者倒下了！（消灭：' + state.killCount + '）', 1.6);
        } else {
          // 受击咆哮提示
          setMessage('命中！感染者发出嘶吼。', 0.8);
        }
      }

      // 枪声吸引附近感染者
      for (let i = 0; i < state.enemies.length; i++) {
        if (state.enemies[i].entity.getPosition().distance(player.getPosition()) < 120) {
          state.enemies[i].hearTimer = 6;
          state.enemies[i].state = 'chase';
        }
      }
      
      // 枪声有概率引来新感染者
      if (Math.random() < .55 && state.enemies.length < 40) spawnInfected(false);
      updateUi();
    }

    // ========== 升级后的感染者AI ==========
    function updateEnemies(dt) {
      const p = player.getPosition();
      
      for (let i = state.enemies.length - 1; i >= 0; i--) {
        const enemy = state.enemies[i];
        const ep = enemy.entity.getPosition();
        const d = ep.distance(p);
        
        // 状态机更新
        enemy.stateTimer -= dt;
        enemy.lastGroan -= dt;
        
        // 检测玩家
        const canSee = d < 45 || enemy.hearTimer > 0;
        const canHear = d < 80 && (state.fireTimer > 0 || state.running);
        
        // 状态转换
        if (enemy.state === 'stunned') {
          if (enemy.stateTimer <= 0) {
            enemy.state = 'chase';
          }
          // 硬直时不动，但继续更新计时器
          enemy.hearTimer = Math.max(0, enemy.hearTimer - dt);
          enemy.attackTimer -= dt;
          continue;
        }
        
        if (canSee || canHear) {
          enemy.state = 'chase';
        } else if (enemy.state === 'chase' && d > 60) {
          enemy.state = 'wander';
        }
        
        // 根据状态执行行为
        if (enemy.state === 'chase') {
          let targetDir = tmpC.copy(p).sub(ep);
          targetDir.y = 0;
          
          if (targetDir.lengthSq() > .01) {
            targetDir.normalize();
            // 追击速度根据距离变化 - 近距离更疯狂
            const chaseSpeed = d < 8 ? enemy.speed * 1.6 : enemy.speed * 1.2;
            ep.add(targetDir.mulScalar(chaseSpeed * dt));
            enemy.entity.lookAt(p.x, ep.y, p.z);
            
            // 追击时添加颠簸动画效果
            const bob = Math.sin(state.time * 8 + enemy.animOffset) * 0.05;
            enemy.entity.setPosition(ep.x, Math.max(0, ep.y + bob), ep.z);
          }
          
          // 追击时偶尔嘶吼
          if (enemy.lastGroan <= 0 && d < 30) {
            enemy.lastGroan = 3 + Math.random() * 4;
            if (d < 15) {
              setMessage('感染者发出恐怖的嘶吼声！', 1.2);
            }
          }
          
          // 眼睛发光增强
          if (enemy.eyeLight) {
            enemy.eyeLight.light.intensity = 1.5 + Math.sin(state.time * 10) * 0.5;
          }
          
        } else {
          // 游荡状态
          ep.add(enemy.wander.clone().mulScalar(enemy.speed * 0.25 * dt));
          
          // 游荡时偶尔改变方向
          if (Math.random() < 0.005) {
            enemy.wander.set(Math.random() - 0.5, 0, Math.random() - 0.5).normalize();
            enemy.entity.lookAt(ep.x + enemy.wander.x, ep.y, ep.z + enemy.wander.z);
          }
          
          // 游荡动画
          const wanderBob = Math.sin(state.time * 2 + enemy.animOffset) * 0.03;
          enemy.entity.setPosition(ep.x, Math.max(0, ep.y + wanderBob), ep.z);
          
          // 游荡时眼睛微光
          if (enemy.eyeLight) {
            enemy.eyeLight.light.intensity = 0.3 + Math.sin(state.time * 3) * 0.2;
          }
        }
        
        // 边界限制
        ep.x = pc.math.clamp(ep.x, -worldSize / 2 + 10, worldSize / 2 - 10);
        ep.z = pc.math.clamp(ep.z, -worldSize / 2 + 10, worldSize / 2 - 10);
        
        enemy.attackTimer -= dt;
        enemy.hearTimer = Math.max(0, enemy.hearTimer - dt);
        
        // 攻击判定
        if (d < 1.8 && enemy.attackTimer <= 0 && enemy.state === 'chase') {
          enemy.attackTimer = 0.8;
          state.hp -= 15;
          
          // 攻击特效
          triggerScreenShake(1.0);
          
          setMessage('被感染者抓伤了！快拉开距离！', 1.2);
          if (state.hp <= 0) {
            state.hp = 0;
            updateUi();
            endGame('你被感染者撕碎');
            return;
          }
        }
      }
      
      // 动态生成新感染者
      if (state.enemies.length < 15 && Math.random() < 0.015) spawnInfected(false);
    }

    function updateDayNight() {
      const t = (Math.sin(state.time * .025) + 1) * .5;
      sun.light.intensity = .35 + t * 1.15;
      app.scene.exposure = .62 + t * .55;
      app.scene.fogStart = 35 + t * 30;
      app.scene.fogEnd = 210 + t * 130;
      flashlight.light.intensity = state.flashlight ? 2.2 : 0;
    }

    app.on('update', function(dt) {
      if (!state.started || !state.alive) return;
      dt = Math.min(dt, .05);
      state.time += dt;
      state.fireTimer = Math.max(0, state.fireTimer - dt);
      movePlayer(dt);
      updateNeeds(dt);
      updateEnemies(dt);
      updateDayNight();
      findNearestLoot();
      updateMiniMap();
      updateUi();
    });

    window.addEventListener('resize', function() { app.resizeCanvas(); });

    window.addEventListener('keydown', function(e) {
      if (!state.started || !state.alive) return;
      if (e.code === 'KeyE') lootNearest();
      if (e.code === 'KeyF') {
        state.flashlight = !state.flashlight;
        setMessage(state.flashlight ? '手电打开。' : '手电关闭。');
      }
      if (e.code === 'KeyR') resetGame();
    });

    // ========== 手游控制 ==========
    function setupMoveJoystick() {
      const zone = document.getElementById('joystickLeft');
      const stick = document.getElementById('stickLeft');
      let pointerId = null;
      let centerX = 0;
      let centerY = 0;
      const maxDist = 42;

      function reset() {
        pointerId = null;
        state.joyLeft.active = false;
        state.joyLeft.dx = 0;
        state.joyLeft.dy = 0;
        stick.style.transform = 'translate(-50%, -50%)';
      }

      zone.addEventListener('pointerdown', function(e) {
        e.preventDefault();
        pointerId = e.pointerId;
        zone.setPointerCapture(pointerId);
        const rect = zone.getBoundingClientRect();
        centerX = rect.left + rect.width / 2;
        centerY = rect.top + rect.height / 2;
        state.joyLeft.active = true;
        update(e);
      });

      function update(e) {
        if (pointerId !== e.pointerId) return;
        let dx = e.clientX - centerX;
        let dy = e.clientY - centerY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > maxDist) {
          dx = dx / dist * maxDist;
          dy = dy / dist * maxDist;
        }
        stick.style.transform = 'translate(calc(-50% + ' + dx + 'px), calc(-50% + ' + dy + 'px))';
        state.joyLeft.dx = dx / maxDist;
        state.joyLeft.dy = -dy / maxDist;
      }

      zone.addEventListener('pointermove', function(e) { e.preventDefault(); update(e); });
      zone.addEventListener('pointerup', function(e) { e.preventDefault(); if (e.pointerId === pointerId) reset(); });
      zone.addEventListener('pointercancel', function(e) { e.preventDefault(); if (e.pointerId === pointerId) reset(); });
    }

    function setupLookArea() {
      const area = ui.lookArea;
      area.addEventListener('pointerdown', function(e) {
        if (e.target.classList && e.target.classList.contains('action-btn')) return;
        e.preventDefault();
        state.lookPointerId = e.pointerId;
        state.lastLookX = e.clientX;
        state.lastLookY = e.clientY;
        area.setPointerCapture(e.pointerId);
      });
      area.addEventListener('pointermove', function(e) {
        if (state.lookPointerId !== e.pointerId || !state.started || !state.alive) return;
        e.preventDefault();
        const dx = e.clientX - state.lastLookX;
        const dy = e.clientY - state.lastLookY;
        state.lastLookX = e.clientX;
        state.lastLookY = e.clientY;
        state.yaw -= dx * 0.006;
        state.pitch -= dy * 0.005;
        state.pitch = pc.math.clamp(state.pitch, -1.20, .74);
      });
      function end(e) {
        if (state.lookPointerId === e.pointerId) state.lookPointerId = null;
      }
      area.addEventListener('pointerup', end);
      area.addEventListener('pointercancel', end);
    }

    setupMoveJoystick();
    setupLookArea();

    function bindTap(el, fn) {
      el.addEventListener('pointerdown', function(e) {
        e.preventDefault();
        e.stopPropagation();
        fn(e);
      });
    }

    bindTap(ui.btnShoot, function() { fireWeapon(); });
    bindTap(ui.btnLoot, function() { lootNearest(); });
    bindTap(ui.btnFlashlight, function() {
      state.flashlight = !state.flashlight;
      setMessage(state.flashlight ? '手电打开。' : '手电关闭。');
    });
    ui.btnRun.addEventListener('pointerdown', function(e) { e.preventDefault(); e.stopPropagation(); state.running = true; });
    ui.btnRun.addEventListener('pointerup', function(e) { e.preventDefault(); state.running = false; });
    ui.btnRun.addEventListener('pointercancel', function(e) { e.preventDefault(); state.running = false; });
    ui.btnRun.addEventListener('pointerleave', function() { state.running = false; });

    ui.startButton.addEventListener('click', function() {
      if (!state.loaded) return;
      if (!buildWorld.done) {
        buildWorld.done = true;
        buildWorld();
      }
      resetGame();
    });

    ui.restartButton.addEventListener('click', resetGame);

    loadAssets();
    } catch (error) {
      const message = document.getElementById('message');
      const button = document.getElementById('startButton');
      if (message) message.textContent = '初始化错误：' + (error && error.message ? error.message : error);
      if (button) { button.textContent = '加载失败，请刷新'; button.disabled = false; }
      console.error('初始化错误', error);
    }
  </script>
</body>
