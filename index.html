<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>快乐农场 - 星露谷风格大世界</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #2d1f0e;
            overflow: hidden;
            font-family: 'Press Start 2P', cursive;
            width: 100vw;
            height: 100vh;
        }

        #game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            touch-action: none;
        }

        /* ========================================
           登录界面 - 星露谷像素风
           ======================================== */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, #87ceeb 0%, #b8e6ff 35%, #e8d5a3 50%, #4a7c3f 50%, #3d6b35 70%, #2d5a25 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            flex-direction: column;
        }

        /* 云朵装饰 */
        #login-overlay::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse 60px 30px at 15% 15%, rgba(255,255,255,0.7) 50%, transparent 50%),
                radial-gradient(ellipse 80px 35px at 45% 10%, rgba(255,255,255,0.6) 50%, transparent 50%),
                radial-gradient(ellipse 50px 25px at 75% 18%, rgba(255,255,255,0.65) 50%, transparent 50%),
                radial-gradient(ellipse 70px 30px at 85% 8%, rgba(255,255,255,0.5) 50%, transparent 50%);
            pointer-events: none;
        }

        .login-box {
            background: #f4e8c1;
            border: 4px solid #5c3d1e;
            padding: 32px 36px;
            box-shadow: 8px 8px 0 rgba(0,0,0,0.35);
            text-align: center;
            max-width: 440px;
            width: 90%;
            position: relative;
            z-index: 1;
            border-radius: 2px;
        }

        .login-box h1 {
            font-size: 36px;
            color: #ffd93d;
            text-shadow: 3px 3px 0 #5c3d1e;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .login-box .subtitle {
            color: #d4c4a0;
            font-size: 10px;
            margin-bottom: 24px;
            letter-spacing: 1px;
        }

        .login-box input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border: 3px solid #5c3d1e;
            background: #fff8e7;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            color: #3d2817;
            margin-bottom: 12px;
            outline: none;
            border-radius: 0;
        }

        .login-box input[type="text"]:focus {
            background: #fff;
            border-color: #8b6d3f;
        }

        /* 像素风复选框 */
        .login-box .remember-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 14px;
            color: #5c3d1e;
            font-size: 10px;
            cursor: pointer;
        }

        .login-box .remember-row input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #fff8e7;
            border: 2px solid #5c3d1e;
            cursor: pointer;
            position: relative;
            border-radius: 0;
        }

        .login-box .remember-row input[type="checkbox"]:checked::after {
            content: 'x';
            position: absolute;
            top: -2px;
            left: 2px;
            color: #4caf50;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            font-weight: bold;
        }

        .login-box button {
            width: 100%;
            padding: 14px;
            background: #4caf50;
            border: 3px solid #5c3d1e;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 4px 4px 0 #3d2817;
            transition: all 0.1s;
            margin-top: 8px;
            letter-spacing: 1px;
            border-radius: 0;
        }

        .login-box button:hover {
            background: #5cbf60;
        }

        .login-box button:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #3d2817;
            background: #3d8b40;
        }

        .login-box .hint {
            color: #8b6d3f;
            font-size: 8px;
            margin-top: 16px;
            line-height: 2;
        }

        .login-box details {
            margin-top: 10px;
            text-align: left;
        }

        .login-box details summary {
            color: #8b6d3f;
            font-size: 9px;
            cursor: pointer;
        }

        /* ========================================
           HUD - 星露谷风格
           ======================================== */
        #hud {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: none;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px 12px;
            pointer-events: none;
            z-index: 50;
        }

        #hud.active { display: flex; }

        .hud-box {
            background: #3d2817;
            border: 2px solid #5c3d1e;
            padding: 6px 10px;
            color: #f4e8c1;
            font-size: 9px;
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            border-radius: 0;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
        }

        .hud-box .value { color: #ffd93d; }

        .hud-left, .hud-right { display: flex; flex-direction: column; gap: 5px; }

        /* 体力条 */
        #stamina-bar-container {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #3d2817;
            border: 2px solid #5c3d1e;
            padding: 6px 10px;
            border-radius: 0;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
            pointer-events: auto;
        }

        #stamina-bar {
            width: 80px;
            height: 10px;
            background: #2d1f0e;
            border: 2px solid #5c3d1e;
            border-radius: 0;
            overflow: hidden;
        }

        #stamina-bar-fill {
            height: 100%;
            width: 100%;
            background: #4caf50;
            transition: width 0.3s;
        }

        #stamina-bar-fill.low {
            background: #e74c3c;
        }

        #stamina-text {
            color: #f4e8c1;
            font-size: 8px;
            min-width: 45px;
        }

        /* 时间大字显示 */
        #time-display {
            font-size: 22px !important;
            color: #ffd93d !important;
            text-shadow: 2px 2px 0 #5c3d1e;
            letter-spacing: 1px;
        }

        /* 金币图标 */
        .coin-icon {
            width: 10px;
            height: 10px;
            background: #ffd93d;
            border: 2px solid #c4a96a;
            border-radius: 50%;
            display: inline-block;
            box-shadow: inset -1px -1px 0 #c4a96a;
        }

        /* HP标签 */
        .hp-label {
            color: #4caf50;
            font-size: 9px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* ========================================
           工具栏 - 底部居中
           ======================================== */
        #toolbar {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 4px;
            z-index: 55;
            background: #3d2817;
            border: 3px solid #5c3d1e;
            padding: 6px 8px;
            border-radius: 0;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
        }

        #toolbar.active { display: flex; }

        .tool-item {
            width: 48px;
            height: 44px;
            background: #2d1f0e;
            border: 2px solid #5c3d1e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            border-radius: 0;
            position: relative;
        }

        .tool-item:hover { background: #3d2817; }
        .tool-item.active {
            border-color: #ffd93d;
            background: #3d2817;
            box-shadow: inset 0 0 0 1px #ffd93d;
        }

        .tool-item svg {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            flex-shrink: 0;
        }

        .tool-item .tool-label {
            font-size: 7px;
            color: #c4a96a;
            white-space: nowrap;
            font-family: 'Press Start 2P', cursive;
            line-height: 1;
            margin-top: 2px;
        }

        .tool-separator {
            width: 2px;
            background: #5c3d1e;
            margin: 2px 1px;
        }

        /* ========================================
           快捷物品栏 - 工具栏右侧
           ======================================== */
        #hotbar {
            position: fixed;
            bottom: 60px;
            left: calc(50% + 210px);
            display: none;
            gap: 2px;
            z-index: 55;
            background: #3d2817;
            border: 3px solid #5c3d1e;
            padding: 6px 8px;
            border-radius: 0;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
        }

        #hotbar.active { display: flex; }

        .hotbar-slot {
            width: 40px;
            height: 40px;
            background: #2d1f0e;
            border: 2px solid #5c3d1e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 0;
            position: relative;
        }

        .hotbar-emoji { font-size: 14px; line-height: 1; }
        .hotbar-count { font-size: 8px; color: #ffd93d; line-height: 1; }
        .hotbar-empty { width: 8px; height: 8px; background: #5c3d1e; border-radius: 0; }

        /* ========================================
           对话框 - 星露谷风格
           ======================================== */
        #dialog-box {
            position: fixed;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            max-width: 92vw;
            background: #f4e8c1;
            border: 4px solid #5c3d1e;
            padding: 16px 20px;
            color: #3d2817;
            font-size: 10px;
            z-index: 65;
            display: none;
            line-height: 1.8;
            border-radius: 0;
            box-shadow: 6px 6px 0 rgba(0,0,0,0.3);
        }

        #dialog-box.active { display: block; }

        #dialog-speaker {
            color: #5c3d1e;
            font-weight: bold;
            font-size: 10px;
            margin-bottom: 6px;
            padding-bottom: 4px;
            border-bottom: 2px solid #d4a574;
        }

        #dialog-text {
            min-height: 24px;
            color: #3d2817;
        }

        /* 对话框闪烁提示箭头 */
        #dialog-box.active::after {
            content: 'v';
            position: absolute;
            bottom: 6px;
            right: 12px;
            color: #5c3d1e;
            font-size: 10px;
            animation: dialogBlink 1s infinite;
        }

        @keyframes dialogBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        /* ========================================
           背包面板
           ======================================== */
        #backpack-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 460px;
            max-width: 92vw;
            background: #f4e8c1;
            border: 4px solid #5c3d1e;
            padding: 20px;
            z-index: 75;
            display: none;
            border-radius: 0;
            box-shadow: 8px 8px 0 rgba(0,0,0,0.3);
        }

        #backpack-panel.active { display: block; }

        #backpack-panel h3 {
            color: #5c3d1e;
            font-size: 12px;
            margin-bottom: 14px;
            text-align: center;
            border-bottom: 2px solid #d4a574;
            padding-bottom: 8px;
        }

        #backpack-grid {
            display: grid;
            grid-template-columns: repeat(8, 44px);
            gap: 3px;
            justify-content: center;
            position: relative;
        }

        .backpack-cell {
            width: 44px;
            height: 44px;
            background: #2d1f0e;
            border: 2px solid #5c3d1e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            border-radius: 0;
        }

        #backpack-cursor {
            position: absolute;
            width: 44px;
            height: 44px;
            border: 2px solid #ffd93d;
            pointer-events: none;
            transition: left 0.1s, top 0.1s;
            border-radius: 0;
        }

        /* ========================================
           商店面板
           ======================================== */
        #shop-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            max-width: 90vw;
            background: #f4e8c1;
            border: 4px solid #5c3d1e;
            padding: 20px;
            z-index: 75;
            display: none;
            border-radius: 0;
            box-shadow: 8px 8px 0 rgba(0,0,0,0.3);
        }

        #shop-panel.active { display: block; }

        #shop-panel h3 {
            color: #5c3d1e;
            font-size: 12px;
            margin-bottom: 14px;
            text-align: center;
            border-bottom: 2px solid #d4a574;
            padding-bottom: 8px;
        }

        #shop-list {
            max-height: 280px;
            overflow-y: auto;
        }

        .shop-item {
            padding: 10px 12px;
            color: #3d2817;
            font-size: 9px;
            border-bottom: 2px solid #d4a574;
            cursor: pointer;
            transition: background 0.1s;
            border-radius: 0;
        }

        .shop-item:hover { background: #e8d5a3; }

        .shop-item.selected {
            background: #d4a574;
            border-left: 4px solid #ffd93d;
            color: #3d2817;
        }

        /* ========================================
           小地图
           ======================================== */
        #minimap {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 120px;
            height: 120px;
            background: #3d2817;
            border: 3px solid #5c3d1e;
            z-index: 50;
            display: block;
            border-radius: 0;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
        }

        #minimap.hidden { display: none; }

        /* ========================================
           Toast - 像素风提示
           ======================================== */
        #toast {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: #f4e8c1;
            border: 4px solid #5c3d1e;
            color: #3d2817;
            padding: 14px 24px;
            font-size: 10px;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.4s ease, transform 0.4s ease;
            pointer-events: none;
            text-align: center;
            border-radius: 0;
            box-shadow: 6px 6px 0 rgba(0,0,0,0.3);
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ========================================
           控制提示
           ======================================== */
        #controls-hint {
            position: fixed;
            top: 10px;
            left: 10px;
            background: #3d2817;
            border: 2px solid #5c3d1e;
            padding: 10px 12px;
            color: #c4a96a;
            font-size: 8px;
            z-index: 45;
            display: none;
            line-height: 2;
            border-radius: 0;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
        }

        #controls-hint.active { display: block; }

        #controls-hint kbd {
            background: #2d1f0e;
            border: 2px solid #5c3d1e;
            padding: 1px 5px;
            color: #f4e8c1;
            font-family: 'Press Start 2P', cursive;
            border-radius: 0;
            font-size: 8px;
        }

        /* ========================================
           设备类型媒体查询
           ======================================== */
        @media (hover: hover) and (pointer: fine) {
            #toolbar {
                display: none;
            }
            #toolbar.active {
                display: flex;
            }
            #touch-toolbar {
                display: none !important;
            }
            #touch-controls {
                display: none !important;
            }
        }

        @media (hover: none) and (pointer: coarse) {
            #touch-controls {
                display: flex !important;
            }
            #controls-hint {
                display: none !important;
            }
            #toolbar {
                display: none !important;
            }
            #hotbar {
                bottom: 150px;
                left: calc(50% + 160px);
            }
            #dialog-box {
                bottom: 180px;
            }
            #minimap {
                display: none !important;
            }
        }

        #touch-controls {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            pointer-events: none;
            z-index: 80;
        }

        /* 虚拟摇杆 */
        #joystick-zone {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 160px;
            height: 160px;
            pointer-events: auto;
            touch-action: none;
        }

        #joystick-base {
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: rgba(61, 40, 23, 0.6);
            border: 3px solid #5c3d1e;
            box-shadow: inset 0 0 16px rgba(0,0,0,0.3);
            transition: background 0.2s, border-color 0.2s;
        }

        #joystick-base.active {
            background: rgba(61, 40, 23, 0.8);
            border-color: #ffd93d;
        }

        #joystick-thumb {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #d4a574;
            border: 3px solid #5c3d1e;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        /* 互动按钮 */
        #touch-interact {
            position: fixed;
            bottom: 40px;
            right: 20px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #4caf50;
            border: 3px solid #5c3d1e;
            color: #fff;
            font-size: 14px;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
            transition: transform 0.1s, background 0.2s;
        }

        #touch-interact:active {
            background: #3d8b40;
            transform: scale(0.93);
        }

        /* 背包触控按钮 */
        #touch-backpack {
            position: fixed;
            bottom: 140px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 0;
            background: #3d2817;
            border: 3px solid #5c3d1e;
            color: #f4e8c1;
            font-size: 10px;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        #touch-backpack:active {
            background: #5c3d1e;
            border-color: #ffd93d;
            transform: scale(0.93);
        }

        /* 触控工具栏 */
        #touch-toolbar {
            position: fixed;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            pointer-events: auto;
            touch-action: none;
            z-index: 70;
        }

        .touch-tool-btn {
            width: 52px;
            height: 52px;
            border-radius: 0;
            background: #3d2817;
            border: 3px solid #5c3d1e;
            color: #f4e8c1;
            font-size: 10px;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
            transition: all 0.15s ease;
        }

        .touch-tool-btn svg {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            flex-shrink: 0;
        }

        .touch-tool-btn .tool-label {
            font-size: 7px;
            color: #f4e8c1;
            white-space: nowrap;
            font-family: 'Press Start 2P', cursive;
            line-height: 1;
            margin-top: 2px;
        }

        .touch-tool-btn.active {
            border-color: #ffd93d;
            background: #5c3d1e;
            box-shadow: inset 0 0 0 1px #ffd93d, 4px 4px 0 rgba(0,0,0,0.3);
        }

        .touch-tool-btn:active {
            transform: scale(0.93);
        }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- ===== 登录界面 ===== -->
    <div id="login-overlay">
        <div class="login-box">
            <h1>快乐农场</h1>
            <p class="subtitle">星露谷风格 大世界种菜冒险</p>
            <input type="text" id="player-name" placeholder="输入你的名字" maxlength="12">
            <input type="text" id="room-id" placeholder="房间号 (留空创建新房)">
            <label class="remember-row">
                <input type="checkbox" id="remember-me" checked>
                <span>记住我</span>
            </label>
            <details>
                <summary>GitHub 配置</summary>
                <input type="text" id="github-token" placeholder="Personal Access Token">
                <input type="text" id="github-repo" placeholder="用户名/仓库名">
            </details>
            <button id="start-btn">开始种田</button>
            <p class="hint">
                WASD 移动  空格 互动  1-5 工具<br>
                B 背包  E NPC  Q 使用  Tab 种子  F 钓鱼
            </p>
        </div>
    </div>

    <!-- ===== HUD ===== -->
    <div id="hud">
        <div class="hud-left">
            <div class="hud-box">

    <!-- ===== 触控控件初始化 ===== -->
    <script>
    // 登录界面：读取 localStorage 记住的名字
    (function() {
        const savedName = localStorage.getItem('farm_player_name');
        if (savedName) {
            document.getElementById('player-name').value = savedName;
        }
        const rememberCheckbox = document.getElementById('remember-me');
        // 绑定开始按钮保存逻辑
        const startBtn = document.getElementById('start-btn');
        const originalOnClick = startBtn.onclick;
        startBtn.addEventListener('click', function() {
            const nameInput = document.getElementById('player-name');
            const name = nameInput.value.trim();
            if (rememberCheckbox.checked && name) {
                localStorage.setItem('farm_player_name', name);
            } else {
                localStorage.removeItem('farm_player_name');
            }
        });
    })();

    // 触控事件处理器 - 在 main.js 的 startGame() 创建 input 后自动绑定
    window._touchInit = function() {
        if (window._touchInitialized) return;
        window._touchInitialized = true;

        const joystickZone = document.getElementById('joystick-zone');
        const joystickThumb = document.getElementById('joystick-thumb');
        const joystickBase = document.getElementById('joystick-base');
        let joystickActive = false;
        const joystickRadius = 45;

        function getInput() {
            return (typeof input !== 'undefined') ? input : (window.input || null);
        }

        function handleJoystickStart(e) {
            e.preventDefault();
            joystickActive = true;
            joystickBase.classList.add('active');
            handleJoystickMove(e);
        }

        function handleJoystickMove(e) {
            if (!joystickActive) return;
            e.preventDefault();

            const touch = e.touches ? e.touches[0] : e;
            const rect = joystickBase.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist > joystickRadius) {
                dx = (dx / dist) * joystickRadius;
                dy = (dy / dist) * joystickRadius;
            }

            joystickThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;

            const deadzone = 10;
            const inp = getInput();
            if (inp) {
                if (dist > deadzone) {
                    inp.setJoystickDir(dx / joystickRadius, dy / joystickRadius);
                } else {
                    inp.setJoystickDir(0, 0);
                }
            }
        }

        function handleJoystickEnd(e) {
            e.preventDefault();
            joystickActive = false;
            joystickBase.classList.remove('active');
            joystickThumb.style.transform = 'translate(-50%, -50%)';
            const inp = getInput();
            if (inp) {
                inp.setJoystickDir(0, 0);
                inp.joystickActive = false;
            }
        }

        joystickZone.addEventListener('touchstart', handleJoystickStart, { passive: false });
        joystickZone.addEventListener('touchmove', handleJoystickMove, { passive: false });
        joystickZone.addEventListener('touchend', handleJoystickEnd, { passive: false });
        joystickZone.addEventListener('touchcancel', handleJoystickEnd, { passive: false });

        // 鼠标支持 (调试用)
        joystickZone.addEventListener('mousedown', handleJoystickStart);
        window.addEventListener('mousemove', handleJoystickMove);
        window.addEventListener('mouseup', handleJoystickEnd);

        // ===== 互动按钮 =====
        const interactBtn = document.getElementById('touch-interact');
        interactBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            const inp = getInput();
            if (inp) inp.triggerInteract();
        }, { passive: false });

        // ===== 背包按钮 =====
        const backpackBtn = document.getElementById('touch-backpack');
        backpackBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            const inp = getInput();
            if (inp) inp.toggleBackpack();
        }, { passive: false });

        // ===== 工具切换按钮 =====
        document.querySelectorAll('.touch-tool-btn').forEach(function(btn) {
            btn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                const tool = parseInt(btn.dataset.tool);
                const inp = getInput();
                if (inp) {
                    inp.setTool(tool);
                }
                document.querySelectorAll('.touch-tool-btn').forEach(function(b) {
                    b.classList.remove('active');
                });
                btn.classList.add('active');
            }, { passive: false });
        });

        console.log('[Touch] 触控事件已绑定到 input');
    };
    </script>
