<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌾 快乐农场 - 星露谷风格</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #1a1a2e;
            overflow: hidden;
            font-family: 'ZCOOL KuaiLe', cursive;
            width: 100vw;
            height: 100vh;
        }
        
        #game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            touch-action: none;
        }
        
        /* ===== 登录界面 ===== */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, #87ceeb 0%, #e8d5a3 50%, #4a7c3f 50%, #3d6b35 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            flex-direction: column;
        }
        
        .login-box {
            background: #f4e8c1;
            border: 4px solid #5c3d1e;
            padding: 30px 40px;
            box-shadow: 8px 8px 0 rgba(0,0,0,0.3), inset 2px 2px 0 rgba(255,255,255,0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        
        .login-box h1 {
            font-size: 36px;
            color: #5c3d1e;
            text-shadow: 2px 2px 0 #c4a96a;
            margin-bottom: 5px;
        }
        
        .login-box .subtitle {
            color: #8b6d3f;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .login-box input {
            width: 100%;
            padding: 10px 14px;
            border: 3px solid #5c3d1e;
            background: #fff8e7;
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 16px;
            color: #5c3d1e;
            margin-bottom: 12px;
            outline: none;
        }
        
        .login-box input:focus {
            box-shadow: inset 0 0 0 2px #c4a96a;
        }
        
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #e74c3c;
            border: 3px solid #5c3d1e;
            color: #fff;
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 4px 4px 0 #5c3d1e;
            transition: all 0.1s;
            margin-top: 5px;
        }
        
        .login-box button:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 #5c3d1e;
        }
        
        .login-box button:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #5c3d1e;
        }
        
        .login-box .hint {
            color: #8b6d3f;
            font-size: 12px;
            margin-top: 15px;
        }
        
        .login-box details {
            margin-top: 12px;
            text-align: left;
        }
        
        .login-box details summary {
            color: #8b6d3f;
            font-size: 13px;
            cursor: pointer;
        }
        
        /* ===== HUD ===== */
        #hud {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: none;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px 15px;
            pointer-events: none;
            z-index: 50;
        }
        
        #hud.active { display: flex; }
        
        .hud-box {
            background: rgba(20, 15, 10, 0.85);
            border: 2px solid #c4a96a;
            padding: 8px 14px;
            color: #f4e8c1;
            font-size: 14px;
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .hud-box .icon { font-size: 20px; }
        .hud-box .value { color: #ffd93d; font-weight: bold; }
        
        .hud-left, .hud-right { display: flex; flex-direction: column; gap: 6px; }
        
        /* ===== 工具栏 ===== */
        #toolbar {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 4px;
            z-index: 50;
            background: rgba(20, 15, 10, 0.85);
            border: 2px solid #c4a96a;
            padding: 6px 10px;
        }
        
        #toolbar.active { display: flex; }
        
        .tool-item {
            width: 48px;
            height: 48px;
            background: #3d2b1f;
            border: 2px solid #5c3d1e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .tool-item:hover { background: #5c3d1e; }
        .tool-item.active {
            border-color: #ffd93d;
            background: #5c3d1e;
            box-shadow: 0 0 8px #ffd93d;
        }
        
        .tool-separator {
            width: 2px;
            background: #5c3d1e;
            margin: 4px 2px;
        }
        
        /* ===== 对话框 ===== */
        #dialog-box {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            max-width: 90vw;
            background: rgba(20, 15, 10, 0.92);
            border: 3px solid #c4a96a;
            padding: 16px 20px;
            color: #f4e8c1;
            font-size: 16px;
            z-index: 60;
            display: none;
            line-height: 1.6;
        }
        
        #dialog-box.active { display: block; }
        
        #dialog-box .speaker {
            color: #ffd93d;
            font-weight: bold;
            margin-bottom: 4px;
        }
        
        /* ===== 小地图 ===== */
        #minimap {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 150px;
            height: 150px;
            background: rgba(20, 15, 10, 0.85);
            border: 2px solid #c4a96a;
            z-index: 50;
            display: none;
        }
        
        #minimap.active { display: block; }
        
        /* ===== 提示 ===== */
        #toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 15, 10, 0.9);
            border: 2px solid #ffd93d;
            color: #f4e8c1;
            padding: 12px 24px;
            font-size: 18px;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            text-align: center;
        }
        
        #toast.show { opacity: 1; }
        
        /* ===== 控制提示 ===== */
        #controls-hint {
            position: fixed;
            bottom: 80px;
            right: 10px;
            background: rgba(20, 15, 10, 0.7);
            border: 1px solid #5c3d1e;
            padding: 8px 12px;
            color: #8b7355;
            font-size: 11px;
            z-index: 50;
            display: none;
            line-height: 1.8;
        }
        
        #controls-hint.active { display: block; }
        
        #controls-hint kbd {
            background: #3d2b1f;
            border: 1px solid #5c3d1e;
            padding: 1px 5px;
            color: #c4a96a;
            font-family: monospace;
        }

        /* ===== 触控控件 (仅触摸设备显示) ===== */
        @media (hover: none) and (pointer: coarse) {
            #touch-controls {
                display: flex !important;
            }
            #controls-hint {
                display: none !important;
            }
        }

        #touch-controls {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            pointer-events: none;
            z-index: 80;
        }

        /* 虚拟摇杆 */
        #joystick-zone {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            pointer-events: auto;
            touch-action: none;
        }

        #joystick-base {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        #joystick-thumb {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.6);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: none;
        }

        /* 互动按钮 */
        #touch-interact {
            position: fixed;
            bottom: 40px;
            right: 20px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 217, 61, 0.4);
            border: 3px solid rgba(255, 217, 61, 0.7);
            color: #ffd93d;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #touch-interact:active {
            background: rgba(255, 217, 61, 0.7);
            transform: scale(0.95);
        }

        /* 触控工具栏 */
        #touch-toolbar {
            position: fixed;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            pointer-events: auto;
            touch-action: none;
        }

        .touch-tool-btn {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: rgba(20, 15, 10, 0.8);
            border: 2px solid #5c3d1e;
            color: #f4e8c1;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        .touch-tool-btn.active {
            border-color: #ffd93d;
            background: rgba(255, 217, 61, 0.3);
            box-shadow: 0 0 8px rgba(255, 217, 61, 0.5);
        }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <canvas id="gameCanvas"></canvas>
    </div>
    
    <!-- 登录界面 -->
    <div id="login-overlay">
        <div class="login-box">
            <h1>🌾 快乐农场</h1>
            <p class="subtitle">星露谷风格 · 2D联机种菜</p>
            <input type="text" id="player-name" placeholder="输入你的名字" maxlength="12">
            <input type="text" id="room-id" placeholder="房间号 (留空创建新房)">
            <details>
                <summary>⚙️ GitHub 配置</summary>
                <input type="text" id="github-token" placeholder="Personal Access Token">
                <input type="text" id="github-repo" placeholder="用户名/仓库名">
            </details>
            <button id="start-btn">🚀 开始种田</button>
            <p class="hint">WASD移动 · 空格键互动 · 数字键切换工具</p>
        </div>
    </div>
    
    <!-- HUD -->
    <div id="hud">
        <div class="hud-left">
            <div class="hud-box">
                <span class="icon">👤</span>
                <span id="hud-name">农场主</span>
            </div>
            <div class="hud-box">
                <span class="icon">💰</span>
                <span class="value" id="hud-coins">500</span>
            </div>
            <div class="hud-box">
                <span class="icon">📅</span>
                <span id="hud-day">第 1 天</span>
                <span id="hud-season" style="color:#4ade80">春</span>
            </div>
        </div>
        <div class="hud-right">
            <div class="hud-box">
                <span class="icon">🕐</span>
                <span id="hud-time">06:00</span>
            </div>
            <div class="hud-box">
                <span class="icon">🌤️</span>
                <span id="hud-weather">晴朗</span>
            </div>
            <div class="hud-box">
                <span>🏠</span>
                <span id="hud-room">-</span>
            </div>
        </div>
    </div>
    
    <!-- 工具栏 -->
    <div id="toolbar">
        <div class="tool-item active" data-tool="0" title="锄头 [1]">⛏️</div>
        <div class="tool-item" data-tool="1" title="水壶 [2]">🚿</div>
        <div class="tool-item" data-tool="2" title="种子袋 [3]">🌱</div>
        <div class="tool-item" data-tool="3" title="收获 [4]">🧺</div>
        <div class="tool-item" data-tool="4" title="铲除 [5]">🗑️</div>
        <div class="tool-separator"></div>
        <div class="tool-item" data-tool="5" title="地图 [M]">🗺️</div>
        <div class="tool-item" data-tool="6" title="背包 [B]">🎒</div>
    </div>
    
    <!-- 对话框 -->
    <div id="dialog-box">
        <div class="speaker" id="dialog-speaker"></div>
        <div id="dialog-text"></div>
    </div>
    
    <!-- 小地图 -->
    <canvas id="minimap" width="150" height="150"></canvas>
    
    <!-- 提示 -->
    <div id="toast"></div>

    <!-- 触控控件 (仅触摸设备显示) -->
    <div id="touch-controls">
        <!-- 虚拟摇杆 -->
        <div id="joystick-zone">
            <div id="joystick-base">
                <div id="joystick-thumb"></div>
            </div>
        </div>
        <!-- 互动按钮 -->
        <div id="touch-interact">A</div>
        <!-- 工具切换 -->
        <div id="touch-toolbar">
            <div class="touch-tool-btn active" data-tool="0">⛏️</div>
            <div class="touch-tool-btn" data-tool="1">🚿</div>
            <div class="touch-tool-btn" data-tool="2">🌱</div>
            <div class="touch-tool-btn" data-tool="3">🧺</div>
            <div class="touch-tool-btn" data-tool="4">🗑️</div>
        </div>
    </div>
    
    <!-- 控制提示 -->
    <div id="controls-hint">
        <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 移动<br>
        <kbd>空格</kbd> 互动<br>
        <kbd>1</kbd>-<kbd>5</kbd> 切换工具<br>
        <kbd>M</kbd> 地图 · <kbd>B</kbd> 背包
    </div>

    <script src="js/config.js"></script>
    <script src="js/github-backend.js"></script>
    <script src="js/webrtc.js"></script>
    <script src="js/assets-loader.js"></script>
    <script src="js/game-engine.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/input.js"></script>
    <script src="js/main.js"></script>

    <!-- 触控控件初始化 -->
    <script>
    (function() {
        // ===== 虚拟摇杆 =====
        const joystickZone = document.getElementById('joystick-zone');
        const joystickThumb = document.getElementById('joystick-thumb');
        const joystickBase = document.getElementById('joystick-base');
        let joystickActive = false;
        const joystickRadius = 35; // 摇杆最大偏移半径

        function handleJoystickStart(e) {
            e.preventDefault();
            joystickActive = true;
            handleJoystickMove(e);
        }

        function handleJoystickMove(e) {
            if (!joystickActive) return;
            e.preventDefault();

            const touch = e.touches ? e.touches[0] : e;
            const rect = joystickBase.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            // 限制在半径内
            if (dist > joystickRadius) {
                dx = (dx / dist) * joystickRadius;
                dy = (dy / dist) * joystickRadius;
            }

            // 移动摇杆拇指
            joystickThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;

            // 计算方向 (归一化)
            const deadzone = 8;
            if (dist > deadzone) {
                const ndx = dx / joystickRadius;
                const ndy = dy / joystickRadius;
                // 设置摇杆方向
                if (typeof input !== 'undefined' && input) {
                    input.setJoystickDir(ndx, ndy);
                }
            } else {
                if (typeof input !== 'undefined' && input) {
                    input.setJoystickDir(0, 0);
                }
            }
        }

        function handleJoystickEnd(e) {
            e.preventDefault();
            joystickActive = false;
            joystickThumb.style.transform = 'translate(-50%, -50%)';
            if (typeof input !== 'undefined' && input) {
                input.setJoystickDir(0, 0);
                input.joystickActive = false;
            }
        }

        joystickZone.addEventListener('touchstart', handleJoystickStart, { passive: false });
        joystickZone.addEventListener('touchmove', handleJoystickMove, { passive: false });
        joystickZone.addEventListener('touchend', handleJoystickEnd, { passive: false });
        joystickZone.addEventListener('touchcancel', handleJoystickEnd, { passive: false });

        // 鼠标支持 (调试用)
        joystickZone.addEventListener('mousedown', handleJoystickStart);
        window.addEventListener('mousemove', handleJoystickMove);
        window.addEventListener('mouseup', handleJoystickEnd);

        // ===== 互动按钮 =====
        const interactBtn = document.getElementById('touch-interact');
        interactBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            if (typeof input !== 'undefined' && input) {
                input.triggerInteract();
            }
        }, { passive: false });

        // ===== 工具切换按钮 =====
        document.querySelectorAll('.touch-tool-btn').forEach(function(btn) {
            btn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                const tool = parseInt(btn.dataset.tool);
                if (typeof input !== 'undefined' && input) {
                    input.setTool(tool);
                }
                // 更新触控工具栏高亮
                document.querySelectorAll('.touch-tool-btn').forEach(function(b) {
                    b.classList.remove('active');
                });
                btn.classList.add('active');
            }, { passive: false });
        });
    })();
    </script>
</body>
</html>
