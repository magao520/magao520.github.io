<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>末日赌场 - 废土娱乐</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0a0f;--panel:#12121a;--accent:#ff2a2a;--glow:rgba(255,42,42,.3);--gold:#d4a017;--gold-glow:rgba(212,160,23,.3);--green:#2ecc71;--text:#e0e0e0;--dim:#666;--border:#2a2a3a}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.15) 2px,rgba(0,0,0,.15) 4px);pointer-events:none;z-index:1000}
  #auth-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#1a1a2e,#0a0a0f);z-index:100}
  .auth-box{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:40px;width:400px;text-align:center;position:relative;overflow:hidden}
  .auth-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--gold),var(--accent));background-size:200% 100%;animation:scan 3s linear infinite}
  @keyframes scan{0%{background-position:-200% 0}100%{background-position:200% 0}}
  .logo{font-family:'Orbitron',sans-serif;font-size:32px;font-weight:900;color:var(--accent);text-shadow:0 0 20px var(--glow);margin-bottom:8px;letter-spacing:4px}
  .logo-sub{font-size:12px;color:var(--dim);letter-spacing:6px;margin-bottom:30px}
  .auth-input{width:100%;padding:12px 16px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;margin-bottom:12px;outline:none;transition:.3s}
  .auth-input:focus{border-color:var(--accent);box-shadow:0 0 10px var(--glow)}
  .auth-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#c41e1e);border:none;border-radius:6px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:.3s;margin-top:8px;text-transform:uppercase;letter-spacing:2px}
  .auth-btn:hover{box-shadow:0 0 20px var(--glow);transform:translateY(-1px)}
  .auth-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .auth-toggle{margin-top:16px;font-size:13px;color:var(--dim)}
  .auth-toggle a{color:var(--accent);cursor:pointer}
  #main-screen{display:none;min-height:100vh}
  .top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:rgba(10,10,15,.9);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;backdrop-filter:blur(10px)}
  .top-bar .logo-sm{font-family:'Orbitron',sans-serif;font-size:18px;color:var(--accent);letter-spacing:2px}
  .user-info{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .chip-display{display:flex;align-items:center;gap:8px;background:rgba(212,160,23,.1);border:1px solid rgba(212,160,23,.3);padding:6px 14px;border-radius:20px;font-family:'Orbitron',sans-serif;font-size:14px;color:var(--gold)}
  .chip-icon{width:16px;height:16px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#b8860b);border:2px solid #fff;box-shadow:0 0 8px var(--gold-glow)}
  .online-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);display:inline-block;margin-right:4px}
  .online-dot.off{background:#555;box-shadow:none}
  .sm-btn{background:transparent;border:1px solid var(--border);color:var(--dim);padding:6px 14px;border-radius:4px;cursor:pointer;font-size:12px;transition:.3s}
  .sm-btn:hover{border-color:var(--accent);color:var(--accent)}
  .lobby{padding:40px 24px;max-width:1200px;margin:0 auto}
  .lobby-title{font-family:'Orbitron',sans-serif;font-size:24px;color:var(--text);margin-bottom:30px;text-align:center}
  .game-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:24px}
  .game-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:.4s;position:relative}
  .game-card:hover{border-color:var(--accent);box-shadow:0 0 30px rgba(255,42,42,.15);transform:translateY(-4px)}
  .game-card-header{padding:30px;text-align:center;position:relative;overflow:hidden}
  .game-card-header::before{content:'';position:absolute;inset:0;opacity:.1}
  .game-card:nth-child(1) .game-card-header::before{background:radial-gradient(circle at center,var(--accent),transparent 70%)}
  .game-card:nth-child(2) .game-card-header::before{background:radial-gradient(circle at center,var(--gold),transparent 70%)}
  .game-icon{font-size:48px;margin-bottom:12px}
  .game-name{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:700;margin-bottom:6px}
  .game-card:nth-child(1) .game-name{color:var(--accent)}
  .game-card:nth-child(2) .game-name{color:var(--gold)}
  .game-desc{font-size:13px;color:var(--dim)}
  .game-card-body{padding:20px 30px;border-top:1px solid var(--border)}
  .play-btn{width:100%;padding:14px;border:none;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer;transition:.3s;text-transform:uppercase;letter-spacing:3px}
  .game-card:nth-child(1) .play-btn{background:linear-gradient(135deg,var(--accent),#8b0000);color:#fff}
  .game-card:nth-child(2) .play-btn{background:linear-gradient(135deg,var(--gold),#8b6914);color:#1a1a1a}
  .play-btn:hover{box-shadow:0 0 20px rgba(255,255,255,.1);transform:scale(1.02)}
  .play-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
  /* 联机面板 */
  .room-panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:30px;max-width:500px;margin:30px auto;text-align:center}
  .room-panel h3{font-family:'Orbitron',sans-serif;font-size:18px;color:var(--gold);margin-bottom:20px}
  .room-code{font-family:'Orbitron',sans-serif;font-size:36px;color:var(--accent);letter-spacing:8px;padding:16px;background:rgba(255,42,42,.05);border:2px dashed var(--accent);border-radius:8px;margin:16px 0;cursor:pointer;user-select:all}
  .room-code:hover{background:rgba(255,42,42,.1)}
  .room-hint{font-size:12px;color:var(--dim);margin-top:8px}
  .room-players{margin:20px 0}
  .room-player{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border);border-radius:6px;margin:6px 0;background:rgba(255,255,255,.02)}
  .room-player .dot{width:10px;height:10px;border-radius:50%;background:var(--green)}
  .room-player .dot.waiting{background:var(--gold);animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .room-player .name{flex:1;text-align:left;font-size:14px}
  .room-player .tag{font-size:11px;color:var(--dim)}
  .start-game-btn{margin-top:20px;padding:14px 40px;background:linear-gradient(135deg,var(--green),#1e7e34);border:none;border-radius:6px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:2px}
  .start-game-btn:disabled{opacity:.4;cursor:not-allowed}
  .join-row{display:flex;gap:10px;margin:16px 0}
  .join-row input{flex:1;padding:12px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:18px;font-family:'Orbitron',sans-serif;text-align:center;letter-spacing:4px;text-transform:uppercase}
  .join-row input:focus{border-color:var(--accent);outline:none}
  .join-row button{padding:12px 20px;background:var(--accent);border:none;border-radius:6px;color:#fff;font-weight:700;cursor:pointer;font-size:14px}
  .status-text{font-size:13px;color:var(--dim);margin-top:12px;min-height:20px}
  .status-text.error{color:var(--accent)}
  .status-text.ok{color:var(--green)}
  /* 游戏界面 */
  #game-screen{display:none;min-height:100vh;padding-bottom:40px}
  .game-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:rgba(10,10,15,.95);border-bottom:1px solid var(--border)}
  .game-title{font-family:'Orbitron',sans-serif;font-size:18px}
  .table-area{max-width:900px;margin:30px auto;padding:0 20px}
  .poker-table{background:radial-gradient(ellipse at center,#1a3a1a,#0d1f0d 60%,#0a0f0a);border:3px solid #2a4a2a;border-radius:20px;padding:30px;position:relative;box-shadow:inset 0 0 60px rgba(0,0,0,.5),0 0 40px rgba(46,204,113,.1)}
  .poker-table::before{content:'';position:absolute;inset:8px;border:1px dashed rgba(46,204,113,.2);border-radius:14px;pointer-events:none}
  .player-area{display:flex;flex-direction:column;align-items:center;margin:16px 0}
  .player-name{font-size:13px;color:var(--dim);margin-bottom:8px}
  .player-name.active{color:var(--accent);text-shadow:0 0 10px var(--glow)}
  .cards-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .card{width:72px;height:100px;background:#fff;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.4);transition:.3s;font-family:'Orbitron',sans-serif;user-select:none}
  .card.red{color:#d32f2f}.card.black{color:#212121}
  .card-back{width:72px;height:100px;background:linear-gradient(135deg,#1a237e,#0d47a1);border-radius:8px;border:2px solid #3949ab;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.4)}
  .card-back::after{content:'\2620';font-size:28px;color:rgba(255,255,255,.3)}
  .card-rank{font-size:24px;font-weight:700}.card-suit{font-size:28px}
  .card:hover{transform:translateY(-4px);box-shadow:0 6px 16px rgba(0,0,0,.5)}
  .pot-area{text-align:center;padding:20px;margin:20px 0}
  .pot-label{font-size:12px;color:var(--dim);letter-spacing:3px;text-transform:uppercase}
  .pot-amount{font-family:'Orbitron',sans-serif;font-size:36px;color:var(--gold);text-shadow:0 0 20px var(--gold-glow);margin-top:4px}
  .action-bar{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:24px;padding:20px;background:rgba(0,0,0,.3);border-radius:12px;border:1px solid var(--border)}
  .action-btn{padding:12px 28px;border:1px solid var(--border);border-radius:6px;background:rgba(255,255,255,.03);color:var(--text);font-size:14px;font-weight:700;cursor:pointer;transition:.3s;min-width:100px;text-transform:uppercase;letter-spacing:1px}
  .action-btn:hover:not(:disabled){border-color:var(--accent);box-shadow:0 0 15px var(--glow)}
  .action-btn:disabled{opacity:.3;cursor:not-allowed}
  .action-btn.primary{background:linear-gradient(135deg,var(--accent),#8b0000);border-color:var(--accent);color:#fff}
  .action-btn.success{background:linear-gradient(135deg,var(--green),#1e7e34);border-color:var(--green);color:#fff}
  .action-btn.warning{background:linear-gradient(135deg,var(--gold),#8b6914);border-color:var(--gold);color:#1a1a1a}
  .bet-control{display:flex;align-items:center;gap:12px;margin-top:12px;justify-content:center}
  .bet-slider{flex:1;max-width:300px;-webkit-appearance:none;height:6px;background:var(--border);border-radius:3px;outline:none}
  .bet-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:var(--accent);border-radius:50%;cursor:pointer;box-shadow:0 0 10px var(--glow)}
  .bet-value{font-family:'Orbitron',sans-serif;font-size:18px;color:var(--gold);min-width:80px;text-align:right}
  .game-log{max-width:900px;margin:20px auto;padding:0 20px}
  .log-panel{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:16px;max-height:200px;overflow-y:auto;font-size:13px}
  .log-entry{padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03);color:var(--dim)}
  .log-entry:last-child{border-bottom:none}
  .log-entry.system{color:var(--accent)}.log-entry.win{color:var(--gold)}.log-entry.lose{color:#888}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:200}
  .modal-overlay.open{display:flex}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:40px;text-align:center;max-width:400px;width:90%}
  .modal-title{font-family:'Orbitron',sans-serif;font-size:28px;margin-bottom:16px}
  .modal-title.win{color:var(--gold);text-shadow:0 0 20px var(--gold-glow)}
  .modal-title.lose{color:var(--dim)}
  .modal-text{font-size:15px;color:var(--text);margin-bottom:24px;line-height:1.6}
  .modal-btn{padding:12px 32px;background:linear-gradient(135deg,var(--accent),#8b0000);border:none;border-radius:6px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:2px}
  .hand-type{font-size:11px;color:var(--gold);margin-top:4px;text-align:center}
  @media(max-width:640px){.auth-box{width:90%;padding:30px 20px}.logo{font-size:24px}.game-cards{grid-template-columns:1fr}.card,.card-back{width:56px;height:78px}.card-rank{font-size:18px}.card-suit{font-size:22px}.action-btn{padding:10px 18px;font-size:12px;min-width:80px}.pot-amount{font-size:24px}.room-code{font-size:28px}}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:fadeIn .5s ease-out}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box fade-in">
    <div class="logo">WASTELAND</div>
    <div class="logo-sub">末日赌场</div>
    <input type="text" class="auth-input" id="auth-name" placeholder="输入昵称" maxlength="12">
    <button class="auth-btn" id="auth-btn">进入赌场</button>
    <div class="auth-toggle"><span id="auth-hint">输入昵称即可开始</span></div>
  </div>
</div>

<div id="main-screen">
  <div class="top-bar">
    <div class="logo-sm">WASTELAND</div>
    <div class="user-info">
      <span class="online-dot" id="online-dot"></span>
      <span id="conn-status" style="font-size:12px;color:var(--dim)">连接中...</span>
      <div class="chip-display"><div class="chip-icon"></div><span id="user-chips">10000</span></div>
      <span id="user-name" style="font-size:13px;color:var(--dim)">玩家</span>
      <button class="sm-btn" onclick="logout()">退出</button>
    </div>
  </div>
  <div class="lobby">
    <div class="lobby-title">选择游戏</div>
    <div class="game-cards">
      <div class="game-card" onclick="openRoom('zjh')">
        <div class="game-card-header"><div class="game-icon">🔥</div><div class="game-name">炸金花</div><div class="game-desc">2-3人联机，牌型决胜</div></div>
        <div class="game-card-body"><button class="play-btn" id="zjh-btn">创建房间</button></div>
      </div>
      <div class="game-card" onclick="openRoom('bj')">
        <div class="game-card-header"><div class="game-icon">♠</div><div class="game-name">二十一点</div><div class="game-desc">联机对战，挑战庄家</div></div>
        <div class="game-card-body"><button class="play-btn" id="bj-btn">创建房间</button></div>
      </div>
    </div>
    <!-- 房间面板 -->
    <div class="room-panel" id="room-panel" style="display:none">
      <h3 id="room-title">创建房间</h3>
      <div id="room-create-area">
        <div class="room-code" id="room-code" onclick="copyCode()">----</div>
        <div class="room-hint">点击房间码复制，发给好友加入</div>
        <div class="room-players" id="room-players"></div>
        <button class="start-game-btn" id="start-btn" disabled onclick="hostStartGame()">等待玩家加入...</button>
      </div>
      <div id="room-join-area" style="display:none">
        <div class="join-row">
          <input type="text" id="join-code" placeholder="输入房间码" maxlength="6">
          <button onclick="joinRoom()">加入</button>
        </div>
        <div class="status-text" id="join-status"></div>
      </div>
      <div style="margin-top:16px">
        <button class="sm-btn" onclick="closeRoom()">取消</button>
      </div>
    </div>
  </div>
</div>

<div id="game-screen">
  <div class="game-header">
    <button class="sm-btn" onclick="leaveGame()">退出游戏</button>
    <div class="game-title" id="game-title">炸金花</div>
    <div class="chip-display"><div class="chip-icon"></div><span id="game-chips">10000</span></div>
  </div>
  <div class="table-area">
    <div class="poker-table">
      <div class="player-area" id="p2-area"><div class="player-name" id="p2-name">等待中...</div><div class="cards-row" id="p2-cards"></div><div class="hand-type" id="p2-hand"></div></div>
      <div class="pot-area"><div class="pot-label">底池</div><div class="pot-amount" id="pot-amount">0</div></div>
      <div class="player-area" id="p1-area"><div class="player-name" id="p1-name">等待中...</div><div class="cards-row" id="p1-cards"></div><div class="hand-type" id="p1-hand"></div></div>
      <div class="player-area" id="p0-area"><div class="player-name" id="p0-name">你</div><div class="cards-row" id="p0-cards"></div><div class="hand-type" id="p0-hand"></div></div>
      <div class="action-bar" id="action-bar"></div>
      <div class="bet-control" id="bet-control" style="display:none"><input type="range" class="bet-slider" id="bet-slider" min="100" max="10000" step="100" value="200"><div class="bet-value" id="bet-display">200</div></div>
    </div>
  </div>
  <div class="game-log"><div class="log-panel" id="game-log"></div></div>
</div>

<div class="modal-overlay" id="result-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">胜利</div>
    <div class="modal-text" id="modal-text">描述</div>
    <button class="modal-btn" onclick="closeModal()">确定</button>
  </div>
</div>

<script src="js/game.js?v=10"></script>
</body>
</html>
