<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>星露谷 - 像素农场</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=ZCOOL+QingKe+HuangYou&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #1a1a2e;
    overflow: hidden;
    font-family: 'ZCOOL QingKe HuangYou', sans-serif;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  #gameCanvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    position: absolute;
    top: 0; left: 0;
  }

  /* ===== HUD 顶部信息栏 ===== */
  #hud {
    position: fixed;
    top: 12px; left: 12px; right: 12px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
    z-index: 10;
  }

  .hud-panel {
    background: rgba(30, 20, 10, 0.85);
    border: 2px solid #8B6914;
    border-radius: 8px;
    padding: 8px 14px;
    color: #E8D5A3;
    font-size: 14px;
    pointer-events: auto;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    line-height: 1.6;
  }

  .hud-panel .label { color: #A89060; font-size: 12px; }
  .hud-panel .value { color: #FFD700; font-size: 16px; }

  #hud-left { min-width: 140px; }
  #hud-right { text-align: right; min-width: 120px; }

  /* ===== 工具栏 底部 ===== */
  #toolbar {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    background: rgba(30, 20, 10, 0.9);
    border: 2px solid #8B6914;
    border-radius: 10px;
    padding: 6px 10px;
    z-index: 10;
  }

  .tool-slot {
    width: 52px; height: 52px;
    background: rgba(60, 40, 20, 0.7);
    border: 2px solid #5A4020;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: all 0.15s;
  }

  .tool-slot:hover { border-color: #8B6914; }
  .tool-slot.active {
    border-color: #FFD700;
    background: rgba(100, 70, 30, 0.8);
    box-shadow: 0 0 8px rgba(255, 215, 0, 0.4);
  }

  .tool-slot canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  .tool-slot .tool-name {
    position: absolute;
    bottom: -18px;
    font-size: 10px;
    color: #E8D5A3;
    white-space: nowrap;
    text-shadow: 1px 1px 2px #000;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .tool-slot.active .tool-name,
  .tool-slot:hover .tool-name { opacity: 1; }

  .tool-slot .hotkey {
    position: absolute;
    top: 2px; right: 4px;
    font-size: 9px;
    color: #8B6914;
  }

  /* ===== 背包面板 ===== */
  #inventory {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(30, 20, 10, 0.95);
    border: 3px solid #8B6914;
    border-radius: 12px;
    padding: 20px;
    z-index: 100;
    display: none;
    min-width: 360px;
    max-height: 80vh;
    overflow-y: auto;
  }

  #inventory.open { display: block; }

  #inventory h2 {
    color: #FFD700;
    font-size: 20px;
    margin-bottom: 12px;
    text-align: center;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  }

  #inv-grid {
    display: grid;
    grid-template-columns: repeat(8, 48px);
    gap: 4px;
    justify-content: center;
  }

  .inv-slot {
    width: 48px; height: 48px;
    background: rgba(60, 40, 20, 0.6);
    border: 1px solid #5A4020;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: pointer;
  }

  .inv-slot:hover { border-color: #8B6914; }

  .inv-slot .count {
    position: absolute;
    bottom: 1px; right: 3px;
    font-size: 10px;
    color: #FFD700;
    text-shadow: 1px 1px 1px #000;
  }

  .inv-slot .item-name {
    position: absolute;
    bottom: -16px;
    font-size: 9px;
    color: #E8D5A3;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .inv-slot:hover .item-name { opacity: 1; }

  /* ===== 对话框 ===== */
  #dialog {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    width: min(600px, calc(100vw - 40px));
    background: rgba(30, 20, 10, 0.95);
    border: 3px solid #8B6914;
    border-radius: 10px;
    padding: 16px 20px;
    z-index: 50;
    display: none;
    color: #E8D5A3;
    font-size: 15px;
    line-height: 1.6;
  }

  #dialog.open { display: block; }

  #dialog .speaker {
    color: #FFD700;
    font-size: 16px;
    margin-bottom: 6px;
  }

  #dialog .text { min-height: 40px; }

  #dialog .hint {
    color: #8B6914;
    font-size: 11px;
    text-align: right;
    margin-top: 6px;
  }

  /* ===== 小地图 ===== */
  #minimap-container {
    position: fixed;
    bottom: 80px;
    right: 12px;
    z-index: 10;
    border: 2px solid #8B6914;
    border-radius: 6px;
    overflow: hidden;
    opacity: 0.85;
  }

  #minimap {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* ===== Toast 提示 ===== */
  .toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(30, 20, 10, 0.9);
    border: 2px solid #FFD700;
    border-radius: 8px;
    padding: 10px 20px;
    color: #FFD700;
    font-size: 16px;
    z-index: 200;
    animation: toastAnim 2s ease-out forwards;
    pointer-events: none;
  }

  @keyframes toastAnim {
    0% { opacity: 0; transform: translate(-50%, -40%); }
    15% { opacity: 1; transform: translate(-50%, -50%); }
    70% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -60%); }
  }

  /* ===== 加载画面 ===== */
  #loading {
    position: fixed;
    inset: 0;
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    color: #E8D5A3;
    font-size: 24px;
  }

  #loading .title {
    font-size: 36px;
    color: #FFD700;
    margin-bottom: 20px;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
  }

  #load-bar-outer {
    width: 300px;
    height: 16px;
    background: rgba(60, 40, 20, 0.8);
    border: 2px solid #8B6914;
    border-radius: 8px;
    overflow: hidden;
    margin-top: 16px;
  }

  #load-bar {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #4CAF50, #8BC34A);
    border-radius: 6px;
    transition: width 0.3s;
  }

  #load-text {
    margin-top: 8px;
    font-size: 14px;
    color: #A89060;
  }

  /* ===== 触摸控制 (仅移动端) ===== */
  #touch-controls {
    position: fixed;
    bottom: 80px;
    left: 16px;
    z-index: 10;
    display: none;
  }

  @media (hover: none) and (pointer: coarse) {
    #touch-controls { display: block; }
    #toolbar { bottom: 10px; }
    .tool-slot { width: 44px; height: 44px; }
    #minimap-container { bottom: 70px; right: 8px; }
  }

  .dpad {
    width: 120px; height: 120px;
    position: relative;
  }

  .dpad-btn {
    position: absolute;
    width: 40px; height: 40px;
    background: rgba(30, 20, 10, 0.7);
    border: 2px solid #8B6914;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #E8D5A3;
    font-size: 18px;
    cursor: pointer;
  }

  .dpad-btn:active { background: rgba(100, 70, 30, 0.8); }
  .dpad-up { top: 0; left: 40px; }
  .dpad-down { bottom: 0; left: 40px; }
  .dpad-left { top: 40px; left: 0; }
  .dpad-right { top: 40px; right: 0; }

  /* ===== 商店面板 ===== */
  #shop {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(30, 20, 10, 0.95);
    border: 3px solid #8B6914;
    border-radius: 12px;
    padding: 20px;
    z-index: 100;
    display: none;
    min-width: 400px;
    max-height: 80vh;
    overflow-y: auto;
    color: #E8D5A3;
  }

  #shop.open { display: block; }

  #shop h2 {
    color: #FFD700;
    text-align: center;
    margin-bottom: 12px;
  }

  .shop-item {
    display: flex;
    align-items: center;
    padding: 8px;
    border: 1px solid #5A4020;
    border-radius: 6px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .shop-item:hover { background: rgba(100, 70, 30, 0.4); }

  .shop-item .item-icon { width: 32px; height: 32px; margin-right: 10px; }
  .shop-item .item-info { flex: 1; }
  .shop-item .item-name { color: #E8D5A3; font-size: 14px; }
  .shop-item .item-desc { color: #8B6914; font-size: 11px; }
  .shop-item .item-price { color: #FFD700; font-size: 14px; white-space: nowrap; }

  /* ===== 季节/天气指示器 ===== */
  #season-badge {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(30, 20, 10, 0.85);
    border: 2px solid #8B6914;
    border-radius: 20px;
    padding: 4px 16px;
    color: #FFD700;
    font-size: 14px;
    z-index: 10;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
  }

  /* ===== 浮动文字 ===== */
  .float-text {
    position: fixed;
    color: #FFD700;
    font-size: 14px;
    font-weight: bold;
    text-shadow: 1px 1px 2px #000;
    pointer-events: none;
    z-index: 50;
    animation: floatUp 1.5s ease-out forwards;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-40px); }
  }

  /* ===== 滚动条美化 ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: rgba(30, 20, 10, 0.5); }
  ::-webkit-scrollbar-thumb { background: #8B6914; border-radius: 3px; }
</style>
</head>
<body>

<!-- 加载画面 -->
<div id="loading">
  <div class="title">星露谷物语</div>
  <div style="color:#A89060;font-size:14px;margin-bottom:8px;">像素农场</div>
  <div id="load-bar-outer"><div id="load-bar"></div></div>
  <div id="load-text">正在加载素材...</div>
</div>

<!-- 游戏画布 -->
<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div id="hud" style="display:none;">
  <div class="hud-panel" id="hud-left">
    <div><span class="label">时间 </span><span class="value" id="hud-time">6:00</span></div>
    <div><span class="label">日期 </span><span class="value" id="hud-day">第 1 天</span></div>
    <div><span class="label">金币 </span><span class="value" id="hud-gold">500G</span></div>
  </div>
  <div class="hud-panel" id="hud-right">
    <div><span class="label">区域 </span><span class="value" id="hud-area">农场</span></div>
    <div><span class="label">体力 </span><span class="value" id="hud-energy">100</span></div>
  </div>
</div>

<!-- 季节 -->
<div id="season-badge" style="display:none;">
  <span id="season-icon">🌸</span> <span id="season-name">春天</span> · <span id="year-num">第 1 年</span>
</div>

<!-- 工具栏 -->
<div id="toolbar" style="display:none;"></div>

<!-- 小地图 -->
<div id="minimap-container" style="display:none;">
  <canvas id="minimap" width="120" height="120"></canvas>
</div>

<!-- 对话框 -->
<div id="dialog">
  <div class="speaker" id="dialog-speaker"></div>
  <div class="text" id="dialog-text"></div>
  <div class="hint">按 空格键 继续</div>
</div>

<!-- 背包 -->
<div id="inventory">
  <h2>背包</h2>
  <div id="inv-grid"></div>
</div>

<!-- 商店 -->
<div id="shop">
  <h2 id="shop-title">皮埃尔杂货店</h2>
  <div id="shop-list"></div>
  <div style="text-align:center;margin-top:10px;color:#8B6914;font-size:12px;">按 ESC 关闭</div>
</div>

<!-- 触摸控制 -->
<div id="touch-controls">
  <div class="dpad">
    <div class="dpad-btn dpad-up" data-dir="up">▲</div>
    <div class="dpad-btn dpad-down" data-dir="down">▼</div>
    <div class="dpad-btn dpad-left" data-dir="left">◀</div>
    <div class="dpad-btn dpad-right" data-dir="right">▶</div>
  </div>
</div>

<script src="js/game.js?v=1"></script>
</body>
</html>
